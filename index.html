<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOC Portal - Login</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #004e92, #000428);
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      max-width: 400px;
      width: 90%;
    }

    .container h1 {
      font-size: 30px;
      margin-bottom: 15px;
      font-weight: 600;
      color: #ffdd57;
      letter-spacing: 1px;
    }

    .container p {
      font-size: 16px;
      margin-bottom: 30px;
      color: #ddd;
    }

    button {
      background: #ffdd57;
      color: #000;
      font-size: 18px;
      font-weight: bold;
      border: none;
      padding: 12px 40px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #ffc107;
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    /* Subtle animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .container {
      animation: fadeIn 0.8s ease-in-out;
    }

    footer {
      position: absolute;
      bottom: 15px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to NOC Portal</h1>
    <p>Access your No Objection Certificate system</p>
    <button onclick="goToHome()">Login</button>
  </div>

  <footer>
    © 2025 Your College Name. All rights reserved.
  </footer>

  <script>
    function goToHome() {
      // Redirect to your old index (now renamed as home.html)
      window.location.href = "home.html";
    }
  </script>
</body>
</html>
