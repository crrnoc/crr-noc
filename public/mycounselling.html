<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Counselling Students</title>
  <link rel="icon" href="crrengglogo.png" type="image/png" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
      * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #ffffff;
      color: #000;
    }

    .main-container {
      display: flex;
      height: 100vh;
      flex-direction: row;
    }

    .sidebar {
      width: 270px;
      background-color: rgb(247, 201, 155);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 100;
      overflow-y: auto;
      transition: top 0.3s ease-in-out;
    }

    .sidebar h2 {
      margin: 40px 20px 20px 20px;
      color: black;
      font-size: 18px;
    }

    .menu {
      list-style-type: none;
      padding: 0;
    }

    .menu li {
      margin-bottom: 15px;
    }

.menu li a {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 16px;
  color: black;
  padding: 12px 20px;
  border-radius: 8px;
  transition: all 0.3s ease;
  text-decoration: none;  /* 💥 remove underline */
  border: none;           /* 💥 remove borders if any */
}


    .menu li a:hover,
    .menu li.active a {
      background-color: #d4d4d4;
      font-weight: bold;
      transform: translateX(5px);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
    }

    .menu li a span {
      font-size: 18px;
      transition: transform 0.3s ease;
    }

    .menu li a:hover span {
      transform: scale(1.2);
    }

    .logout {
      background-color: #f09000;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 16px;
      width: 50%;
      margin: 20px auto;
      transition: background 0.3s ease;
    }

    .logout:hover {
      background-color: #d07900;
    }

    .content {
      flex-grow: 1;
      margin-left: 270px;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #222;
    }

    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 1200px;
    }

    .student-card {
      background-color: #fff;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .student-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .student-card h3 {
      margin-bottom: 10px;
      font-size: 18px;
      color: #333;
    }

    .student-card p {
      font-size: 14px;
      margin: 4px 0;
      color: #555;
    }

    .mobile-toggle {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #1f75cb;
      color: white;
      font-size: 24px;
      padding: 12px 18px;
      border-radius: 50px;
      z-index: 9999;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    @media (max-width: 768px) {
      .main-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        position: fixed;
        top: -100%;
        left: 0;
        background-color: rgb(247, 201, 155);
        height: auto;
        max-height: 90vh;
        overflow-y: auto;
        z-index: 9999;
        transition: top 0.4s ease;
      }

      .sidebar.open {
        top: 0;
      }

      .content {
        margin-left: 0;
        margin-top: 100px;
        padding: 20px;
      }

      .mobile-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <!-- ☰ Mobile Toggle Button -->
    <div class="mobile-toggle" onclick="toggleMobileMenu()">☰</div>

    <!-- 🧊 Sidebar -->
    <div class="sidebar" id="sidebar">
      <h2>ID: <span id="userId">Loading...</span></h2>
      <ul class="menu">
        <li><a href="knowaboutstd1.html"><span>👤</span> Know about Student</a></li>
        <li><a href="sendnotification.html"><span>📨</span> Send Notification</a></li>
        <li><a href="updatefee.html"><span>💵</span> Update Fee</a></li>
        <li><a href="imposefines.html"><span>💰</span> Impose Fines</a></li>
        <li><a href="addstudent.html"><span>➕</span> Add Student</a></li>
        <li><a href="addmycounselling.html"><span>👥</span> Assign Counselling</a></li>
        <li class="active"><a href="#"><span>📋</span> View Counselling</a></li>
        <li><a href="staffsettings.html"><span>⚙️</span> Settings</a></li>
      </ul>
      <button class="logout" onclick="logout()">Logout</button>
    </div>

    <!-- 📋 Main Content -->
    <div class="content">
      <div class="header">My Counselling Students</div>
      <div class="card-container" id="cardContainer">
        <!-- Student cards will be injected here -->
      </div>
    </div>
  </div>

  <!-- 📦 Modal -->
  <div id="studentModal" style="display: none;">
    <div id="modalOverlay" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; justify-content: center; align-items: center;">
      <div style="background: white; border-radius: 15px; padding: 30px; width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.4);">
        <h2 id="modalName" style="margin-bottom: 10px;">Student Name</h2>
        <p id="modalFather">Father: </p>
        <p id="modalMobile">Mobile: </p>

        <div style="margin: 20px 0;">
          <button onclick="showTab('attendance')" id="btnAttendance"
            style="margin-right:10px; padding: 8px 16px; border-radius: 8px; border: none; background-color: #f0f0f0; cursor: pointer;">📊 Attendance</button>
          <button onclick="showTab('results')" id="btnResults"
            style="padding: 8px 16px; border-radius: 8px; border: none; background-color: #f0f0f0; cursor: pointer;">📚 Results</button>
        </div>

        <div id="attendanceTab" style="display: none;">
          <h3>Attendance Details</h3>
          <div id="attendanceContent"></div>
        </div>

        <div id="resultsTab" style="display: none;">
          <h3>Results Overview</h3>
          <label for="semesterSelect">Select Semester:</label>
          <select id="semesterSelect">
            <option value="">-- Select --</option>
            <option value="1-1">1-1</option>
            <option value="1-2">1-2</option>
            <option value="2-1">2-1</option>
            <option value="2-2">2-2</option>
            <option value="3-1">3-1</option>
            <option value="3-2">3-2</option>
            <option value="4-1">4-1</option>
            <option value="4-2">4-2</option>
          </select>
          <div id="resultsContent"></div>
        </div>

        <button onclick="closeModal()" style="position: absolute; top: 10px; right: 20px; background: #f00; color: #fff; border: none; padding: 6px 10px; border-radius: 5px; font-weight: bold; cursor: pointer;">✖</button>
      </div>
    </div>
  </div>

  <script>
    const userId = localStorage.getItem("userId");
    const role = localStorage.getItem("role");
    document.getElementById("userId").textContent = userId || "Unknown";

    if (!userId || role !== "staff") {
      Swal.fire({
        icon: "error",
        title: "Unauthorized",
        text: "You must login as staff to view this page.",
        confirmButtonText: "Go to Login"
      }).then(() => {
        window.location.href = "index.html";
      });
    } else {
      fetch(`/my-counselling-students/${userId}`)
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById("cardContainer");

          if (data.success && data.students.length > 0) {
            data.students.forEach(std => {
              const card = document.createElement("div");
              card.className = "student-card";
              card.innerHTML = `
                <h3>${std.name}</h3>
                <p><strong>Reg No:</strong> ${std.reg_no}</p>
                <p><strong>Course:</strong> ${std.course}</p>
                <p><strong>Year:</strong> ${std.year}</p>
                <p><strong>Section:</strong> ${std.section}</p>
                <p><strong>Email:</strong> ${std.email}</p>
                <p><strong>Mobile:</strong> ${std.mobile_no}</p>
              `;
              card.onclick = () => openModal(std);
              container.appendChild(card);
            });
          } else {
            container.innerHTML = `<p style="text-align:center; color:#666;">No students assigned yet.</p>`;
          }
        })
        .catch(err => {
          console.error("Error fetching students:", err);
          Swal.fire("Error", "Failed to fetch student data.", "error");
        });
    }

    function openModal(student) {
      document.getElementById("modalName").textContent = student.name;
      document.getElementById("modalFather").textContent = `Father: ${student.father_name || "N/A"}`;
      document.getElementById("modalMobile").textContent = `Father Mobile: ${student.father_mobile || "N/A"}`;
      document.getElementById("studentModal").style.display = "block";
      showTab("attendance");

      fetch(`/student-attendance/${student.reg_no}`)
        .then(res => res.json())
        .then(data => {
          if (data.success && data.data.length > 0) {
            const rows = data.data.map(row => `
              <tr>
                <td>${row.semester}</td>
                <td>${row.total_classes}</td>
                <td>${row.attended_classes}</td>
                <td>${row.percentage}%</td>
              </tr>`).join("");
            document.getElementById("attendanceContent").innerHTML = `
              <table style="width:100%; border-collapse: collapse; margin-top: 10px;">
                <tr style="background:#eee;">
                  <th>Semester</th>
                  <th>Total</th>
                  <th>Attended</th>
                  <th>%</th>
                </tr>
                ${rows}
              </table>
            `;
          } else {
            document.getElementById("attendanceContent").innerHTML = "No attendance data available.";
          }
        });

      const semesterDropdown = document.getElementById("semesterSelect");
      semesterDropdown.value = "";
      semesterDropdown.onchange = () => {
        const semester = semesterDropdown.value;
        if (!semester) {
          document.getElementById("resultsContent").innerHTML = "";
          return;
        }

        fetch(`/student/results/${student.reg_no}?semester=${semester}`)
          .then(res => res.json())
          .then(data => {
            if (data.results && data.results.length > 0) {
              const subjectRows = data.results.map(r => `
                <tr>
                  <td>${r.subcode}</td>
                  <td>${r.subname}</td>
                  <td>${r.grade}</td>
                  <td>${r.credits}</td>
                </tr>`).join("");
              document.getElementById("resultsContent").innerHTML = `
                <table style="width:100%; border-collapse: collapse; margin-top: 10px;">
                  <tr style="background:#eee;">
                    <th>Sub Code</th>
                    <th>Subject</th>
                    <th>Grade</th>
                    <th>Credits</th>
                  </tr>
                  ${subjectRows}
                </table>
                <div style="margin-top: 10px;">
                  <p><strong>SGPA:</strong> ${data.sgpa}</p>
                  <p><strong>CGPA:</strong> ${data.cgpa}</p>
                  <p><strong>Percentage:</strong> ${data.percentage}%</p>
                </div>
              `;
            } else {
              document.getElementById("resultsContent").innerHTML = "No result data for selected semester.";
            }
          });
      };
    }

    function closeModal() {
      document.getElementById("studentModal").style.display = "none";
    }

    function showTab(tabName) {
      document.getElementById("attendanceTab").style.display = tabName === "attendance" ? "block" : "none";
      document.getElementById("resultsTab").style.display = tabName === "results" ? "block" : "none";
      document.getElementById("btnAttendance").style.backgroundColor = tabName === "attendance" ? "#ddd" : "#f0f0f0";
      document.getElementById("btnResults").style.backgroundColor = tabName === "results" ? "#ddd" : "#f0f0f0";
    }

    function logout() {
      localStorage.clear();
      window.location.href = "index.html";
    }

    function toggleMobileMenu() {
      document.querySelector('.sidebar').classList.toggle('open');
    }
  </script>
</body>
</html>
