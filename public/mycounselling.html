<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Counselling Students</title>
  <link rel="icon" href="crrengglogo.png" type="image/png" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #ffffff;
      color: #000;
    }

    .main-container {
      display: flex;
      height: 100vh;
      flex-direction: row;
    }

    .sidebar {
      width: 270px;
      background-color: rgb(247, 201, 155);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 100;
      overflow-y: auto;
      transition: top 0.3s ease-in-out;
    }

    .sidebar h2 {
      margin: 40px 20px 20px 20px;
      color: black;
      font-size: 18px;
    }

    .menu {
      list-style-type: none;
      padding: 0;
    }

    .menu li {
      margin-bottom: 15px;
    }

    .menu li a {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      color: black;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .menu li a:hover,
    .menu li.active a {
      background-color: #d4d4d4;
      font-weight: bold;
      transform: translateX(5px);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
    }

    .logout {
      background-color: #f09000;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 16px;
      width: 50%;
      margin: 20px auto;
      transition: background 0.3s ease;
    }

    .logout:hover {
      background-color: #d07900;
    }

    .content {
      flex-grow: 1;
      margin-left: 270px;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #222;
    }

    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 1200px;
    }

    .student-card {
      background-color: #fff;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .student-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .student-card h3 {
      margin-bottom: 10px;
      font-size: 18px;
      color: #333;
    }

    .student-card p {
      font-size: 14px;
      margin: 4px 0;
      color: #555;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        position: fixed;
        top: -100%;
        transition: top 0.4s ease;
        z-index: 999;
      }

      .sidebar.open {
        top: 0;
      }

      .content {
        margin-left: 0;
        margin-top: 100px;
      }

      .mobile-toggle {
        display: block;
      }
    }

    .mobile-toggle {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #1f75cb;
      color: white;
      font-size: 24px;
      padding: 12px 18px;
      border-radius: 50px;
      z-index: 9999;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <div class="main-container">
    <!-- 🧊 Sidebar -->
    <div class="sidebar" id="sidebar">
      <h2>ID: <span id="userId">Loading...</span></h2>
      <ul class="menu">
        <li><a href="knowaboutstd1.html"><span>👤</span> Know about Student</a></li>
        <li><a href="sendnotification.html"><span>📨</span> Send Notification</a></li>
        <li><a href="updatefee.html"><span>💵</span> Update Fee</a></li>
        <li><a href="imposefines.html"><span>💰</span> Impose Fines</a></li>
        <li><a href="addstudent.html"><span>➕</span> Add Student</a></li>
        <li><a href="assigncounselling.html"><span>👥</span> Assign Counselling</a></li>
        <li class="active"><a href="#"><span>📋</span> View Counselling</a></li>
        <li><a href="staffsettings.html"><span>⚙️</span> Settings</a></li>
      </ul>
      <button class="logout" onclick="logout()">Logout</button>
    </div>

    <!-- 🧾 Main Content -->
    <div class="content">
      <div class="header">My Counselling Students</div>
      <div class="card-container" id="cardContainer">
        <!-- Student cards will be injected here -->
      </div>
    </div>
  </div>

  <!-- 📱 Mobile Toggle -->
  <div class="mobile-toggle" onclick="toggleMobileMenu()">☰</div>

  <!-- 🔌 Script -->
  <script>
    const userId = localStorage.getItem("userId");
    const role = localStorage.getItem("role");
    document.getElementById("userId").textContent = userId || "Unknown";

    // 🔒 Auth Check
    if (!userId || role !== "staff") {
      Swal.fire({
        icon: "error",
        title: "Unauthorized",
        text: "You must login as staff to view this page.",
        confirmButtonText: "Go to Login"
      }).then(() => {
        window.location.href = "index.html";
      });
    } else {
      // 🎯 Fetch counselling students
      fetch(`/my-counselling-students/${userId}`)
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById("cardContainer");

          if (data.success && data.students.length > 0) {
            data.students.forEach(std => {
              const card = document.createElement("div");
              card.className = "student-card";
              card.innerHTML = `
                <h3>${std.name}</h3>
                <p><strong>Reg No:</strong> ${std.reg_no}</p>
                <p><strong>Course:</strong> ${std.course}</p>
                <p><strong>Year:</strong> ${std.year}</p>
                <p><strong>Section:</strong> ${std.section}</p>
                <p><strong>Email:</strong> ${std.email}</p>
                <p><strong>Mobile:</strong> ${std.mobile_no}</p>
              `;
              container.appendChild(card);
            });
          } else {
            container.innerHTML = `<p style="text-align:center; color:#666;">No students assigned yet.</p>`;
          }
        })
        .catch(err => {
          console.error("Error fetching students:", err);
          Swal.fire("Error", "Failed to fetch student data.", "error");
        });
    }

    function logout() {
      localStorage.clear();
      window.location.href = "index.html";
    }

    function toggleMobileMenu() {
      const sidebar = document.getElementById("sidebar");
      sidebar.classList.toggle("open");
    }

    // Auto-close sidebar on mobile after clicking a menu item
    document.querySelectorAll(".menu li a").forEach(link => {
      link.addEventListener("click", () => {
        if (window.innerWidth <= 768) {
          document.querySelector('.sidebar').classList.remove('open');
        }
      });
    });
  </script>
</body>
</html>
