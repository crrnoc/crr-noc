<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mid Marks Search</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f2f2f2;
    }

    h1 {
      color: #333;
    }

    form {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
      max-width: 600px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #007bff;
      color: #fff;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }

    th {
      background-color: #007bff;
      color: white;
    }

    #resultTable {
      display: none;
    }

    .no-results {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Search Student Mid Marks</h1>

  <form id="searchForm" onsubmit="searchMidmarks(event)">
    <label for="year">Select Year:</label>
    <select id="year" name="year" required>
      <option value="" disabled selected>Select Year</option>
      <option value="1">1st Year</option>
      <option value="2">2nd Year</option>
      <option value="3">3rd Year</option>
      <option value="4">4th Year</option>
    </select>

    <label for="semester">Select Semester:</label>
    <select id="semester" name="semester" required>
      <option value="" disabled selected>Select Semester</option>
      <option value="1">1</option>
      <option value="2">2</option>
    </select>

    <label for="query">Search Reg No or Name:</label>
    <input type="text" id="query" name="query" placeholder="Enter Reg No or Name" required />

    <button type="submit">Search</button>
  </form>

  <div id="resultSection">
    <table id="resultTable">
      <thead>
        <tr>
          <th>Reg No</th>
          <th>Name</th>
          <th>Subject</th>
          <th>Mid I</th>
          <th>Mid II</th>
          <th>Average</th>
        </tr>
      </thead>
      <tbody id="resultBody">
        <!-- Results will appear here -->
      </tbody>
    </table>
    <p class="no-results" id="noResults" style="display: none;">No records found.</p>
  </div>

  <script>
    async function searchMidmarks(event) {
      event.preventDefault();

      const year = document.getElementById("year").value;
      const semester = document.getElementById("semester").value;
      const query = document.getElementById("query").value;

      const response = await fetch(`/api/midmarks/search?query=${encodeURIComponent(query)}&year=${year}&semester=${semester}`);
      const data = await response.json();

      const table = document.getElementById("resultTable");
      const tbody = document.getElementById("resultBody");
      const noResults = document.getElementById("noResults");

      tbody.innerHTML = ""; // Clear previous results

      if (data.length === 0) {
        table.style.display = "none";
        noResults.style.display = "block";
        return;
      }

      noResults.style.display = "none";
      table.style.display = "table";

      data.forEach(entry => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${entry.regno}</td>
          <td>${entry.name}</td>
          <td>${entry.subcode}</td>
          <td>${entry.mid1}</td>
          <td>${entry.mid2}</td>
          <td>${entry.average}</td>
        `;
        tbody.appendChild(row);
      });
    }
  </script>

</body>
</html>
