<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Mid Marks</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 10px; border: 1px solid #ccc; text-align: center; }
    th { background-color: #f0f0f0; }
    input, select, button { margin: 5px; padding: 8px; }
    #noResults { color: red; margin-top: 20px; display: none; }
  </style>
</head>
<body>

  <h2>Search Student Mid Marks</h2>

  <form id="searchForm">
    <input type="text" id="regno" placeholder="Enter Reg. No" required />
    <select id="year" required>
      <option value="">Select Year</option>
      <option value="1">Year 1</option>
      <option value="2">Year 2</option>
      <option value="3">Year 3</option>
      <option value="4">Year 4</option>
    </select>
    <select id="semester" required>
      <option value="">Select Semester</option>
      <option value="1">Sem 1</option>
      <option value="2">Sem 2</option>
    </select>
    <button type="submit">Search</button>
  </form>

  <div id="noResults">No mid marks found.</div>

  <table id="resultTable" style="display:none;">
    <thead>
      <tr>
        <th>Reg No</th>
        <th>Name</th>
        <th>Subject Code</th>
        <th>Mid 1</th>
        <th>Mid 2</th>
        <th>Average</th>
      </tr>
    </thead>
    <tbody id="resultBody"></tbody>
  </table>

  <script>
    document.getElementById("searchForm").addEventListener("submit", async function(event) {
      event.preventDefault();

      const regno = document.getElementById("regno").value.trim();
      const year = document.getElementById("year").value;
      const semester = document.getElementById("semester").value;

      const table = document.getElementById("resultTable");
      const tbody = document.getElementById("resultBody");
      const noResults = document.getElementById("noResults");

      tbody.innerHTML = ""; // Clear previous results
      table.style.display = "none";
      noResults.style.display = "none";

      try {
        const response = await fetch(`https://crr-noc.onrender.com/api/midmarks/search?query=${encodeURIComponent(regno)}&year=${year}&semester=${semester}`);
        const result = await response.json();

        if (!Array.isArray(result.midmarks) || result.midmarks.length === 0) {
          noResults.style.display = "block";
          return;
        }

        table.style.display = "table";

        result.midmarks.forEach(mark => {
          const row = document.createElement("tr");

          const m1 = parseFloat(mark.mid1) || 0;
          const m2 = parseFloat(mark.mid2) || 0;
          const avg = ((m1 + m2) / 2).toFixed(1);

          row.innerHTML = `
            <td>${result.regno}</td>
            <td>${result.name || '-'}</td>
            <td>${mark.sub_code}</td>
            <td>${mark.mid1 || '-'}</td>
            <td>${mark.mid2 || '-'}</td>
            <td>${avg}</td>
          `;
          tbody.appendChild(row);
        });
      } catch (err) {
        console.error("Error fetching mid marks:", err);
        noResults.style.display = "block";
        noResults.textContent = "Error fetching data.";
      }
    });
  </script>

</body>
</html>
