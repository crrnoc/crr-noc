<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff - Find Backlogs</title>
    <link rel="icon" href="crrengglogo.png" type="image/png" />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.20/dist/sweetalert2.min.css"
    />
    <style>
        :root {
            --primary-color: #0b2e59;
            --secondary-color: #2c6e91;
            --accent-color: #f7a048;
            --background-dark: #f0f2f5;
            --background-light: #ffffff;
            --text-dark: #333333;
            --text-light: #f4f4f4;
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --border-radius-lg: 16px;
            --border-radius-md: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-dark);
            color: var(--text-dark);
        }
        
        /* Container and Overlay */
        .main-container {
            display: flex;
            min-height: 100vh;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }
        .no-scroll {
            overflow: hidden;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--primary-color);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease-in-out;
            z-index: 1000;
            overflow-y: auto;
        }
        
        .home-icon {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 1.5rem;
            color: var(--text-light);
            cursor: pointer;
            transition: color 0.3s ease, transform 0.3s ease;
        }
        
        .home-icon:hover {
            color: var(--accent-color);
            transform: scale(1.1);
        }

        .sidebar-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .sidebar h2 {
            margin-top: 15px;
            color: var(--text-light);
            font-size: 1.1rem;
            font-weight: bold;
        }

        .menu {
            list-style: none;
            flex-grow: 1;
        }

        .menu li {
            margin-bottom: 12px;
        }

        .menu li a {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1rem;
            color: var(--text-light);
            padding: 15px 20px;
            border-radius: var(--border-radius-md);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .menu li a:hover,
        .menu li.active a {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            font-weight: 500;
            transform: translateX(5px);
            box-shadow: var(--card-shadow);
        }

        .menu li a i {
            font-size: 1.2rem;
            width: 25px;
            text-align: center;
            color: var(--text-light);
            transition: color 0.3s ease;
        }

        .logout {
            background-color: var(--accent-color);
            color: var(--text-light);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            width: 60%;
            margin: 20px auto 0;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .logout:hover {
            background-color: #d3853b;
            transform: scale(1.05);
        }

        /* Main Content */
        .content {
            flex-grow: 1;
            margin-left: 280px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--background-dark);
        }

        .header {
            width: 100%;
            background: var(--background-light);
            padding: 15px 30px;
            box-shadow: var(--card-shadow);
            border-radius: var(--border-radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            position: sticky;
            top: 20px;
            z-index: 10;
        }
        .header h1 {
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            background: var(--background-light);
            padding: 30px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-container h2 {
            margin-bottom: 20px;
            color: var(--primary-color);
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
        }

        .search-container input {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius-md);
            font-size: 1rem;
            text-align: center;
            transition: border-color 0.3s ease;
        }

        .search-container input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .search-container button {
            width: 80%;
            padding: 12px 25px;
            background-color: var(--accent-color);
            color: var(--text-light);
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .search-container button:hover {
            background-color: #d3853b;
            transform: scale(1.02);
        }

        .backlog-count {
            width: 100%;
            max-width: 600px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 30px;
            color: var(--primary-color);
        }
        
        .backlog-count.zero {
            color: var(--secondary-color);
        }

        .backlog-count.non-zero {
            color: #d00000;
        }

        .backlog-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
            justify-content: center;
            width: 100%;
            max-width: 900px;
        }

        .backlog-card {
            background-color: #fff;
            padding: 20px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 350px;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .backlog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        .backlog-card h4 {
            color: var(--primary-color);
            margin-bottom: 5px;
            font-size: 1.1rem;
        }
        
        .backlog-card p {
            margin: 0;
            font-size: 0.9rem;
            color: #666;
        }

        .backlog-card strong {
            color: var(--text-dark);
        }

        /* Mobile View */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: var(--secondary-color);
            color: var(--text-light);
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        @media (max-width: 992px) {
            .mobile-toggle {
                display: flex;
            }
            .sidebar {
                transform: translateX(-100%);
                width: 250px;
                max-width: 80vw;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="overlay" onclick="toggleMobileMenu()"></div>
    <div class="main-container">
        <div class="sidebar" id="sidebar">
            <a href="staff-dashboard.html" class="home-icon"><i class="fas fa-home"></i></a>
            <div class="sidebar-header">
                <h2 id="staffName">Staff Name</h2>
                <h2 style="margin-top: 5px;">ID: <span id="staffId">Loading...</span></h2>
            </div>
            <ul class="menu">
                <li><a href="staff-dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="knowaboutstd1.html"><i class="fas fa-search"></i> Know about Student</a></li>
                <li><a href="editstudentdetails.html"><i class="fas fa-user-edit"></i> Edit Student Details</a></li>
                <li><a href="sendnotification.html"><i class="fas fa-paper-plane"></i> Send Notification</a></li>
                <li><a href="updatefee.html"><i class="fas fa-money-bill-wave"></i> Update Fee</a></li>
                <li><a href="imposefines.html"><i class="fas fa-money-check-alt"></i> Impose Fines</a></li>
                <li><a href="addstudent.html"><i class="fas fa-user-plus"></i> Add Student</a></li>
                <li><a href="mark_attendance.html"><i class="fas fa-clipboard-list"></i> Mark Attendance</a></li>
                <li class="active"><a href="#"><i class="fas fa-book-open"></i> Find Backlogs</a></li>
                <li><a href="mycounselling.html"><i class="fas fa-handshake"></i> View Counselling</a></li>
                <li><a href="staffsettings.html"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
            <button class="logout" onclick="confirmLogout()">Logout</button>
        </div>

        <div class="content">
            <div class="header">
                <h1>Find Student Backlogs</h1>
            </div>

            <div class="search-container">
                <h2>Check Student Backlogs</h2>
                <input type="text" id="regno" placeholder="Enter Registration Number" />
                <button onclick="fetchTotalBacklogs()"><i class="fas fa-search"></i> Check Backlogs</button>
            </div>

            <div id="totalBacklogCount" class="backlog-count" style="display:none;"></div>
            <div id="backlogCards" class="backlog-list" style="display:none;"></div>
        </div>
    </div>

    <div class="mobile-toggle" onclick="toggleMobileMenu()">☰</div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // 🔐 Unauthorized access check
        const userId = localStorage.getItem("userId");
        if (!userId) {
            Swal.fire({
                icon: 'error',
                title: 'Access Denied',
                text: 'Please login first to view this page.',
                confirmButtonText: 'Go to Login',
                allowOutsideClick: false,
                allowEscapeKey: false,
                confirmButtonColor: '#0b2e59'
            }).then(() => {
                window.location.href = "index.html";
            });
        } else {
            document.getElementById("staffId").textContent = userId || "Unknown";
            fetch(`/staff/${userId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.staff_name) {
                        document.getElementById("staffName").textContent = data.staff_name;
                    }
                })
                .catch(err => {
                    console.error("Error loading staff data:", err);
                });
        }

        function confirmLogout() {
            Swal.fire({
                title: 'Are you sure?',
                text: "You will be logged out of your account.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#0b2e59',
                cancelButtonColor: '#d3853b',
                confirmButtonText: 'Yes, log out!'
            }).then((result) => {
                if (result.isConfirmed) {
                    logout();
                }
            });
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        function toggleMobileMenu() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.querySelector('.overlay');
            const body = document.body;

            sidebar.classList.toggle('open');
            overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
            body.classList.toggle('no-scroll', sidebar.classList.contains('open'));
        }

        function fetchTotalBacklogs() {
            const regno = document.getElementById("regno").value.trim().toUpperCase();
            if (!regno) {
                Swal.fire("Missing RegNo", "Please enter a registration number.", "warning");
                return;
            }

            Swal.fire({
                title: 'Fetching backlogs...',
                text: 'Please wait.',
                didOpen: () => { Swal.showLoading(); },
                allowOutsideClick: false
            });

            fetch(`/total-backlogs?regno=${regno}`)
                .then(res => res.json())
                .then(data => {
                    Swal.close();
                    const cardContainer = document.getElementById("backlogCards");
                    const countDiv = document.getElementById("totalBacklogCount");
                    
                    cardContainer.innerHTML = "";
                    cardContainer.style.display = "none";
                    countDiv.style.display = "block";

                    const count = data.count || 0;
                    countDiv.innerHTML = `Total Backlogs: <strong style="font-size: 1.8rem; color: ${count > 0 ? '#d00000' : '#2c6e91'};">${count}</strong>`;
                    
                    if (data.error) {
                         countDiv.innerHTML = `Total Backlogs: <strong style="font-size: 1.8rem; color: #d00000;">N/A</strong>`;
                        Swal.fire("Error", data.error, "error");
                        return;
                    }

                    if (count === 0) {
                        Swal.fire({
                            title: 'No Backlogs Found',
                            text: 'This student has no backlogs.',
                            icon: 'success'
                        });
                        return;
                    }

                    data.backlogData.forEach(item => {
                        const card = document.createElement("div");
                        card.className = "backlog-card";
                        card.innerHTML = `
                            <h4>${item.subname || "N/A"}</h4>
                            <p><strong>Subject Code:</strong> ${item.subcode}</p>
                            <p><strong>Semester:</strong> ${item.semester || "N/A"}</p>
                            <p><strong>Grade:</strong> ${item.grade}</p>
                        `;
                        cardContainer.appendChild(card);
                    });

                    cardContainer.style.display = "flex";
                })
                .catch(err => {
                    Swal.close();
                    console.error("Error fetching data:", err);
                    Swal.fire("Error", "Failed to fetch data. Please try again.", "error");
                });
        }
    </script>
</body>
</html>
