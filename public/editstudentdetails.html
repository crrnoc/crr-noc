<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Student</title>
  <link rel="icon" href="crrengglogo.png" type="image/png" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    /* 💅 Same styles as your Add Student page */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background-color: #1d1d1d;
    }
    .main-container {
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 270px;
      background-color: rgb(247, 201, 155);
      padding: 20px;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      overflow-y: auto;
      z-index: 100;
    }
    .sidebar h2 {
      margin: 40px 0 20px;
      color: black;
      font-size: 18px;
    }
    .menu {
      list-style: none;
      padding: 0;
    }
    .menu li {
      margin-bottom: 15px;
    }
    .menu li a {
      color: black;
      text-decoration: none;
      padding: 12px 20px;
      display: block;
      border-radius: 8px;
      transition: all 0.3s ease;
    }
    .menu li a:hover, .menu li.active a {
      background-color: #d4d4d4;
      font-weight: bold;
    }
    .logout {
      background-color: #f09000;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 20px;
      width: 60%;
    }
    .main {
      margin-left: 270px;
      flex-grow: 1;
      padding: 40px;
      background: white;
      overflow-y: auto;
    }
    .form-box {
      background: linear-gradient(135deg, rgba(54, 169, 225, 0.85), rgba(30, 130, 190, 0.85));
      padding: 30px;
      border-radius: 20px;
      max-width: 700px;
      color: white;
      margin: 0 auto;
    }
    .form-box input,
    .form-box select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      color: #000;
    }
    .form-box label {
      font-weight: bold;
    }
    .form-box button {
      width: 100%;
      padding: 12px;
      background-color: #1D73D2;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      cursor: pointer;
    }
    .form-box button:disabled {
      background-color: #999;
      cursor: not-allowed;
    }
    #preview {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<script>
  const userId = localStorage.getItem("userId");
  if (!userId) {
    Swal.fire({ icon: "warning", title: "Unauthorized", text: "Please login to access this page" }).then(() => {
      window.location.href = "index.html";
    });
  }
</script>

<div class="main-container">
  <div class="sidebar">
    <h2><strong>ID:</strong> <span id="userId">Staff</span></h2>
    <ul class="menu">
        <li><a href="knowaboutstd1.html"><span>👤</span> Know about Student</a></li>
        <li class="active"><a href="#"><span>✏️</span> Edit Student Details</a></li>
        <li><a href="sendnotification.html"><span>📨</span> Send Notification</a></li>
        <li><a href="updatefee.html"><span>💵</span> Update Fee</a></li>
        <li><a href="imposefines.html"><span>💰</span> Impose Fines</a></li>
        <li><a href="addstudent.html"><span>➕</span> Add Student</a></li>
        <li><a href="backlogs.html"><span>📚</span> Find Backlogs</a></li>
        <li><a href="mycounselling.html"><span>📋</span> View Counselling</a></li>
        <li><a href="staffsettings.html"><span>⚙️</span> Settings</a></li>
    </ul>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <div class="main">
    <div class="form-box">
      <h2>Edit Student Profile</h2>
      <div id="fetchBox">
        <input id="regInput" placeholder="Enter Reg No" />
        <button onclick="fetchStudentData()">Fetch</button>
      </div>
      <div id="formContainer"></div>
    </div>
  </div>
</div>

<script>
function logout() {
  localStorage.removeItem("userId");
  location.href = "index.html";
}

function fetchStudentData() {
  const reg = document.getElementById("regInput").value.trim();
  if (!reg) return Swal.fire("Enter registration number");

  fetch(`https://crr-noc.onrender.com/student/${reg}`)
    .then(res => res.json())
    .then(data => showEditForm(data))
    .catch(() => Swal.fire("Student not found"));
}

function showEditForm(data) {
  document.getElementById("fetchBox").style.display = "none";
  const c = document.getElementById("formContainer");
  c.innerHTML = `
    <form id="editForm" enctype="multipart/form-data">
      <input type="hidden" name="userId" value="${data.userId}" />
      <label>Name</label><input name="name" value="${data.name}" required />
      <label>DOB</label><input type="date" name="dob" value="${data.dob?.split('T')[0]}" required />
      <label>Unique ID</label><input name="uniqueId" value="${data.uniqueId}" required />
      <label>Aadhar No</label><input name="aadhar_no" value="${data.aadhar_no || ''}" />
      <label>Mobile No</label><input name="mobile_no" value="${data.mobile_no}" required />
      <label>Email</label><input type="email" name="email" value="${data.email}" required />
      <label>Course</label><input name="course" value="${data.course}" required />
      <label>Dept Code</label><input name="dept_code" value="${data.dept_code || ''}" />
      <label>Year</label><input name="year" value="${data.year}" required />
      <label>Semester</label><input name="semester" value="${data.semester}" required />
      <label>Section</label><input name="section" value="${data.section}" required />
      <label>Father Name</label><input name="father_name" value="${data.father_name}" required />
      <label>Father Mobile</label><input name="father_mobile" value="${data.father_mobile}" required />
      <label>Counsellor Name</label><input name="counsellor_name" value="${data.counsellor_name}" required />
      <label>Counsellor Mobile</label><input name="counsellor_mobile" value="${data.counsellor_mobile}" required />
      <label>Admission Type</label><input name="admission_type" value="${data.admission_type}" required />
      <label>Upload New Photo (max 100KB)</label>
      <input type="file" name="photo" accept="image/*" onchange="previewPhoto(this)" />
      <img id="preview" src="${data.photo_url || ''}" />
      <button type="submit" id="submitBtn">Update</button>
    </form>
  `;

  document.getElementById("editForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    const form = e.target;
    const btn = document.getElementById("submitBtn");
    const file = form.querySelector("input[name='photo']").files[0];
    if (file && file.size > 102400) {
      return Swal.fire("File too large", "Max size: 100KB", "error");
    }
    btn.disabled = true;
    const formData = new FormData(form);
    const res = await fetch("https://crr-noc.onrender.com/editprofile", { method: "POST", body: formData });
    const out = await res.json();
    Swal.fire(out.message.includes("success") ? "Success" : "Error", out.message, out.message.includes("success") ? "success" : "error");
    btn.disabled = false;
    if (out.message.includes("success")) {
      form.remove();
      document.getElementById("fetchBox").style.display = "block";
    }
  });
}

function previewPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => document.getElementById("preview").src = e.target.result;
  reader.readAsDataURL(file);
}
</script>
</body>
</html>
