<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>📝 Mark Attendance</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body {
      font-family: Arial;
      background: #f0f0f0;
      padding: 20px;
    }
    select, button {
      padding: 8px;
      margin: 5px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      background: #fff;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
    }
  </style>
</head>
<body>
  <h2>📌 Mark Attendance</h2>

  <div id="timetable-section">
    <label>Course:</label>
    <select id="courseSelect"></select>

    <label>Section:</label>
    <select id="sectionSelect"></select>

    <label>Period:</label>
    <select id="periodSelect"></select>

    <button onclick="fetchStudents()">Load Students</button>
  </div>

  <form id="attendanceForm" style="margin-top: 20px;">
    <table id="studentsTable">
      <thead>
        <tr>
          <th>Reg No</th>
          <th>Name</th>
          <th>Present</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button type="submit">Submit Attendance</button>
  </form>

  <script>
    const staff_id = localStorage.getItem("staff_id");

    const courseSelect = document.getElementById("courseSelect");
    const sectionSelect = document.getElementById("sectionSelect");
    const periodSelect = document.getElementById("periodSelect");
    const studentsTable = document.querySelector("#studentsTable tbody");
    const form = document.getElementById("attendanceForm");

    let subjects = [];

    window.onload = () => {
      fetch(`/api/staff-allocation?staff_id=${staff_id}`)
        .then(res => res.json())
        .then(data => {
          const uniqueCourses = new Set();
          const uniqueSections = new Set();
          const uniquePeriods = new Set();

          data.forEach(row => {
            uniqueCourses.add(row.course);
            uniqueSections.add(row.section);
            for (let i = 1; i <= 7; i++) {
              const p = row[`period${i}`];
              if (p && p.trim()) uniquePeriods.add(p);
            }
          });

          courseSelect.innerHTML = [...uniqueCourses].map(c => `<option value="${c}">${c}</option>`).join('');
          sectionSelect.innerHTML = [...uniqueSections].map(s => `<option value="${s}">${s}</option>`).join('');
          periodSelect.innerHTML = [...uniquePeriods].map(p => `<option value="${p}">${p}</option>`).join('');
        });
    };

    function fetchStudents() {
      const course = courseSelect.value;
      const section = sectionSelect.value;

      fetch(`/api/students-by-course-section?course=${course}&section=${section}`)
        .then(res => res.json())
        .then(students => {
          studentsTable.innerHTML = students.map(s => `
            <tr>
              <td>${s.regno}</td>
              <td>${s.full_name}</td>
              <td><input type="checkbox" name="attendance" value="${s.regno}" checked /></td>
            </tr>
          `).join('');
        });
    }

    form.onsubmit = async (e) => {
      e.preventDefault();

      const presentRegnos = Array.from(document.querySelectorAll('input[name="attendance"]:checked')).map(cb => cb.value);
      const absentRegnos = Array.from(document.querySelectorAll('input[name="attendance"]:not(:checked)')).map(cb => cb.value);

      const payload = {
        staff_id,
        date: new Date().toISOString().split("T")[0],
        course: courseSelect.value,
        section: sectionSelect.value,
        subject: periodSelect.value,
        present: presentRegnos,
        absent: absentRegnos
      };

      const res = await fetch('/api/submit-attendance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      if (res.ok) {
        Swal.fire("✅ Attendance Marked", "", "success");
      } else {
        Swal.fire("❌ Failed", data.error, "error");
      }
    };
  </script>
</body>
</html>
