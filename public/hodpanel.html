<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOD Dashboard | Students</title>
  <link rel="icon" href="crrengglogo.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --main-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.15);
      --sidebar-color: rgba(0, 0, 0, 0.6);
      --accent: #3cb6ff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(to right top, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      color: #fff;
    }

    .sidebar {
      width: 240px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      background: var(--sidebar-color);
      backdrop-filter: blur(12px);
      padding: 30px 20px;
      border-right: 1px solid var(--glass-border);
    }

    .sidebar h2 {
      font-size: 20px;
      margin-bottom: 30px;
      text-align: center;
      color: #3cb6ff;
    }

    .sidebar a {
      display: block;
      color: #eee;
      text-decoration: none;
      margin: 12px 0;
      padding: 10px 18px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .sidebar a:hover, .sidebar a.active {
      background: rgba(255, 255, 255, 0.08);
      color: #3cb6ff;
      box-shadow: 0 0 12px #3cb6ff;
    }

    .main-content {
      margin-left: 240px;
      padding: 40px;
      flex: 1;
    }

    .welcome-box {
      background: var(--main-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0, 191, 255, 0.1);
      margin-bottom: 30px;
    }

    .welcome-box h2 {
      font-size: 26px;
      color: #00eaff;
      margin-bottom: 10px;
    }

    .search-container {
      margin-bottom: 25px;
    }

    .search-container input {
      padding: 10px 15px;
      width: 300px;
      border-radius: 30px;
      border: none;
      font-size: 16px;
    }

    .student-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
    }

    .student-card {
      background: var(--main-bg);
      padding: 20px;
      border-radius: 16px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
    }

    .student-card h3 {
      color: #00eaff;
      margin-bottom: 5px;
    }

    .student-card p {
      font-size: 14px;
      margin: 4px 0;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>🛡️ HOD Panel</h2>
  <a href="#" class="active">🎓 Students</a>
  <a href="hodresults.html">📊 Results</a>
</div>

<div class="main-content">
  <div class="welcome-box">
    <h2 id="welcomeMsg">Welcome, HOD</h2>
  </div>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="🔍 Search by Reg No...">
  </div>

  <div class="student-grid" id="studentGrid"></div>
</div>

<script>
  let studentsData = [];

  function parseDept(userId) {
    const deptMap = {
      CSE: "Computer Science and Engineering",
      AIML: "Artificial Intelligence & ML",
      AIDS: "Artificial Intelligence & DS",
      CYBER: "Cyber Security"
    };
    for (const key in deptMap) {
      if (userId.includes(key)) return deptMap[key];
    }
    return "Department";
  }

  async function loadStudents() {
    const userId = localStorage.getItem("userId") || "HODCSE";
    const dept = parseDept(userId);

    document.getElementById("welcomeMsg").textContent = `Welcome, Head of the Department of ${dept}`;

    try {
      const res = await fetch(`http://localhost:3000/hod/students?staffId=${userId}&dept=${dept}`);
      const data = await res.json();
      studentsData = data;
      renderStudents(data);
    } catch (err) {
      console.error("Failed to load students:", err);
    }
  }

  function renderStudents(data) {
    const container = document.getElementById("studentGrid");
    container.innerHTML = "";
    data.forEach(student => {
      const div = document.createElement("div");
      div.className = "student-card";
      div.innerHTML = `
        <h3>👤 ${student.name}</h3>
        <p><strong>Reg No:</strong> ${student.reg_no}</p>
        <p><strong>Course:</strong> ${student.course}</p>
        <p><strong>Year:</strong> ${student.year}</p>
        <p><strong>Section:</strong> ${student.section}</p>
      `;
      container.appendChild(div);
    });
  }

  document.getElementById("searchInput").addEventListener("input", (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = studentsData.filter(s => s.reg_no.toLowerCase().includes(term));
    renderStudents(filtered);
  });

  window.onload = loadStudents;
</script>

</body>
</html>
