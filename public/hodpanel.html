<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HOD Student List</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light p-4">
  <div class="container">
    <h2 class="mb-4 text-primary">📘 Students in Your Department</h2>
    <div id="studentList" class="table-responsive">
      <table class="table table-bordered table-striped">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Reg No</th>
            <th>Course</th>
            <th>Year</th>
            <th>Section</th>
            <th>Mobile</th>
            <th>Email</th>
            <th>Father Name</th>
            <th>Father Mobile</th>
          </tr>
        </thead>
        <tbody id="studentsBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const staffId = localStorage.getItem("userId"); // must be something like HODCSE

    if (!staffId || !staffId.startsWith("HOD")) {
      alert("❌ You must be logged in as HOD");
      window.location.href = "/login.html";
    }

    fetch(`/hod/students?staffId=${staffId}`)
      .then((res) => res.json())
      .then((data) => {
        if (!data.students) throw new Error(data.error || "Invalid response");

        const tbody = document.getElementById("studentsBody");
        let i = 1;
        data.students.forEach(student => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${i++}</td>
            <td>${student.name}</td>
            <td>${student.reg_no}</td>
            <td>${student.course}</td>
            <td>${student.year}</td>
            <td>${student.section}</td>
            <td>${student.mobile_no}</td>
            <td>${student.email}</td>
            <td>${student.father_name}</td>
            <td>${student.father_mobile}</td>
          `;
          tbody.appendChild(row);
        });
      })
      .catch((err) => {
        console.error("❌ Failed to load students:", err);
        alert("Failed to load students. Please try again later.");
      });
  </script>
</body>
</html>
