<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HOD Dashboard</title>
  <link rel="icon" href="crrengglogo.png" type="image/png" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(to right, #e0eafc, #cfdef3);
      display: flex;
      min-height: 100vh;
      color: #222;
      overflow-x: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: linear-gradient(180deg, #2c3e50, #34495e);
      padding: 20px;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      color: white;
      transition: all 0.3s ease;
      z-index: 100;
    }

    .sidebar img {
      height: 50px;
      margin: 0 auto 15px auto;
      display: block;
    }

    .sidebar h4 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: bold;
      font-size: 16px;
    }

    .menu a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 12px;
      border-radius: 8px;
      margin: 8px 0;
      transition: all 0.3s ease;
    }

    .menu a:hover,
    .menu .active {
      background: rgba(255, 255, 255, 0.2);
      transform: translateX(5px);
    }

    .logout {
      background-color: #e67e22;
      border: none;
      color: white;
      padding: 12px;
      border-radius: 20px;
      margin-top: auto;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .logout:hover {
      background-color: #ca6f1e;
    }

    /* Main Content */
    .main-content {
      margin-left: 250px;
      flex: 1;
      padding: 40px;
      transition: filter 0.3s ease;
      margin-top: 20px;
      width: 100%;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
      color: #2c3e50;
    }

    /* Filters */
    .filters {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }
    select.form-select {
      width: 220px;
      border-radius: 10px;
    }

    /* Card Box */
    .card-box {
      background: white;
      border-radius: 18px;
      padding: 25px;
      text-align: center;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
      margin-bottom: 20px;
    }
    .card-box:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    }

    /* Circle Progress */
    .circle-container {
      position: relative;
      width: 130px;
      height: 130px;
      margin: 0 auto;
    }
    .circle-container canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
    .circle-container .percent-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 22px;
      font-weight: bold;
      color: #27ae60;
    }
    .fail-text {
      margin-top: 12px;
      font-weight: bold;
      color: #e74c3c;
    }
    #statsContainer {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    /* Overlay */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 90;
      transition: all 0.3s ease;
    }
    .overlay.active {
      display: block;
    }

    /* Mobile Toggle Button */
    .mobile-toggle {
      display: none;
      position: fixed;
      top: 15px;
      left: 15px;
      background: #2c3e50;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 200;
      user-select: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .main-content {
        margin-left: 0;
        padding: 20px;
      }
      .sidebar {
        left: -260px;
        position: fixed;
        transition: left 0.3s ease;
      }
      .sidebar.open {
        left: 0;
      }
      .mobile-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>
  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <!-- Mobile Toggle -->
  <div class="mobile-toggle" id="mobileToggle" onclick="toggleSidebar()">☰ Menu</div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <img src="crrengglogo.png" alt="College Logo" />
    <h4 id="welcomeText">Welcome HOD</h4>
    <div class="menu">
      <a href="hodpanel.html" class="active">🏠 Dashboard</a>
      <a href="students.html">🎓 Students</a>
      <a href="hodbacklogsview.html">📚 Backlogs</a>
      <a href="hodmidmarks.html">📝 Mid Marks</a>
    </div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- Main Content -->
  <div class="main-content" id="main-content">
    <h2>Year, Course & Section Wise Pass/Fail Statistics</h2>

    <!-- Filters -->
    <div class="filters">
      <select id="yearSelect" class="form-select" onchange="fetchCourses()">
        <option value="">-- Select Year --</option>
      </select>
      <select id="courseSelect" class="form-select" onchange="fetchSections()" disabled>
        <option value="">-- Select Course --</option>
      </select>
      <select id="sectionSelect" class="form-select" onchange="fetchStats()" disabled>
        <option value="">-- Select Section --</option>
      </select>
    </div>

    <!-- Cards Container -->
    <div id="statsContainer"></div>
  </div>

  <script>
    const staffId = localStorage.getItem("userId");
    const welcomeText = document.getElementById("welcomeText");
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const mainContent = document.getElementById("main-content");

    // Validate login
    if (!staffId || !staffId.startsWith("HOD")) {
      alert("Please login as HOD");
      window.location.href = "index.html";
    } else {
      const dept = staffId.replace("HOD", "");
      welcomeText.textContent = `Welcome Head of Department - ${dept}`;
    }

    function logout() {
      localStorage.clear();
      window.location.href = "index.html";
    }

    function toggleSidebar() {
      sidebar.classList.toggle("open");
      overlay.classList.toggle("active");
      mainContent.classList.toggle("shifted");
    }

    // Load all Years on page load
    async function loadYears() {
      const res = await fetch(`/hod/pass-fail-stats?staffId=${staffId}`);
      const data = await res.json();

      const years = [...new Set(data.stats.map((s) => s.year))];
      const yearSelect = document.getElementById("yearSelect");
      yearSelect.innerHTML = `<option value="">-- Select Year --</option>`;
      years.forEach((y) => {
        yearSelect.innerHTML += `<option value="${y}">${y} Year</option>`;
      });
    }

    async function fetchCourses() {
      const year = document.getElementById("yearSelect").value;
      if (!year) return;

      const res = await fetch(`/hod/pass-fail-stats?staffId=${staffId}&year=${year}`);
      const data = await res.json();

      const courses = [...new Set(data.stats.map((s) => s.course))];
      const courseSelect = document.getElementById("courseSelect");
      courseSelect.disabled = false;
      courseSelect.innerHTML = `<option value="">-- Select Course --</option>`;
      courses.forEach((c) => {
        courseSelect.innerHTML += `<option value="${c}">${c}</option>`;
      });

      // Reset section + stats
      document.getElementById("sectionSelect").disabled = true;
      document.getElementById("statsContainer").innerHTML = "";
    }

    async function fetchSections() {
      const year = document.getElementById("yearSelect").value;
      const course = document.getElementById("courseSelect").value;
      if (!course) return;

      const res = await fetch(
        `/hod/pass-fail-stats?staffId=${staffId}&year=${year}&course=${course}`
      );
      const data = await res.json();

      const sections = [...new Set(data.stats.map((s) => s.section))];
      const sectionSelect = document.getElementById("sectionSelect");
      sectionSelect.disabled = false;
      sectionSelect.innerHTML = `<option value="">-- Select Section --</option>`;
      sections.forEach((sec) => {
        sectionSelect.innerHTML += `<option value="${sec}">Section ${sec}</option>`;
      });

      document.getElementById("statsContainer").innerHTML = "";
    }

    async function fetchStats() {
      const year = document.getElementById("yearSelect").value;
      const course = document.getElementById("courseSelect").value;
      const section = document.getElementById("sectionSelect").value;

      const res = await fetch(
        `/hod/pass-fail-stats?staffId=${staffId}&year=${year}&course=${course}&section=${section}`
      );
      const data = await res.json();

      const container = document.getElementById("statsContainer");
      container.innerHTML = "";

      if (data.stats.length === 0) {
        container.innerHTML = `<p class="text-center text-secondary">No data available</p>`;
        return;
      }

      data.stats.forEach((record, i) => {
        const card = document.createElement("div");
        card.className = "card-box";
        card.innerHTML = `
          <h5>${record.course} - Section ${record.section}</h5>
          <div class="circle-container">
            <canvas id="circle${i}" width="130" height="130"></canvas>
            <div class="percent-text">${record.pass_percent}%</div>
          </div>
          <div class="fail-text">Fail: ${record.fail_percent}%</div>
        `;
        container.appendChild(card);

        drawCircle(`circle${i}`, record.pass_percent);
      });
    }

    function drawCircle(id, percent) {
      const canvas = document.getElementById(id);
      const ctx = canvas.getContext("2d");
      const radius = 60;
      const startAngle = -0.5 * Math.PI;
      const endAngle = (percent / 100) * 2 * Math.PI + startAngle;

      // Background Circle
      ctx.lineWidth = 10;
      ctx.strokeStyle = "#d6eaf8";
      ctx.beginPath();
      ctx.arc(radius, radius, radius - 10, 0, 2 * Math.PI);
      ctx.stroke();

      // Progress Circle
      ctx.strokeStyle = "#27ae60";
      ctx.beginPath();
      ctx.arc(radius, radius, radius - 10, startAngle, endAngle);
      ctx.stroke();
    }

    // Initialize Years on load
    loadYears();
  </script>
</body>
</html>
