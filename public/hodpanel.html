<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HOD Dashboard</title>
  <link rel="icon" href="crrengglogo.png" type="image/png"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      padding: 20px;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      box-shadow: 2px 0 12px rgba(0,0,0,0.2);
    }

    .sidebar img {
      height: 50px;
      margin: 0 auto 15px auto;
      display: block;
    }

    .sidebar h4 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: bold;
      font-size: 16px;
    }

    .menu a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 12px;
      border-radius: 8px;
      margin: 8px 0;
      transition: all 0.3s ease;
    }

    .menu a:hover {
      background: rgba(255,255,255,0.1);
      transform: translateX(5px);
    }

    .logout {
      background-color: #ff6600;
      border: none;
      color: white;
      padding: 12px;
      border-radius: 20px;
      margin-top: auto;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .logout:hover {
      background-color: #e65c00;
    }

    /* Main Content */
    .main-content {
      margin-left: 250px;
      flex: 1;
      padding: 40px;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: bold;
    }

    /* Card Styles */
    .card-box {
      background: rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 25px;
      text-align: center;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }

    .card-box:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    /* Circle Progress */
    .circle-container {
      position: relative;
      width: 130px;
      height: 130px;
      margin: 0 auto;
    }

    .circle-container canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    .circle-container .percent-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 22px;
      font-weight: bold;
      color: #28a745;
    }

    .fail-text {
      margin-top: 12px;
      font-weight: bold;
      color: #dc3545;
    }

    @media (max-width: 768px) {
      .main-content {
        margin-left: 0;
        padding: 20px;
      }
      .sidebar {
        position: relative;
        width: 100%;
        flex-direction: row;
        align-items: center;
        padding: 10px;
        overflow-x: auto;
      }
      .sidebar img {
        display: none;
      }
      .sidebar h4 {
        display: none;
      }
      .menu {
        display: flex;
        flex: 1;
        justify-content: space-around;
      }
      .menu a {
        margin: 0 5px;
        font-size: 14px;
      }
      .logout {
        margin-left: 10px;
        margin-top: 0;
        font-size: 14px;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <img src="crrengglogo.png" alt="College Logo"/>
    <h4 id="welcomeText">Welcome HOD</h4>
    <div class="menu">
      <a href="hodpanel.html">🏠 Dashboard</a>
      <a href="students.html">🎓 Students</a>
      <a href="totalbacklogs.html">📚 Backlogs</a>
    </div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <h2>📊 Department-wise Pass/Fail Statistics</h2>
    <div class="row" id="statsCards"></div>
  </div>

  <script>
    const userId = localStorage.getItem("userId");
    const welcomeText = document.getElementById("welcomeText");

    if (!userId || !userId.startsWith("HOD")) {
      alert("Please login as HOD");
      window.location.href = "index.html";
    } else {
      const dept = userId.replace("HOD", "");
      welcomeText.textContent = `Welcome Head of Department - ${dept}`;
    }

    function logout() {
      localStorage.clear();
      window.location.href = "index.html";
    }

    // Fetch stats from backend
    fetch(`/hod/pass-fail-stats?staffId=${userId}`)
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("statsCards");
        if (!data.stats || data.stats.length === 0) {
          container.innerHTML = `<p class="text-center text-light">No data available!</p>`;
          return;
        }

        data.stats.forEach((branch, i) => {
          const col = document.createElement("div");
          col.className = "col-md-6 col-lg-3";
          col.innerHTML = `
            <div class="card-box">
              <h5>${branch.course}</h5>
              <div class="circle-container">
                <canvas id="circle${i}" width="130" height="130"></canvas>
                <div class="percent-text">${branch.pass_percent}%</div>
              </div>
              <div class="fail-text">Fail: ${branch.fail_percent}%</div>
            </div>
          `;
          container.appendChild(col);
          drawCircle(`circle${i}`, branch.pass_percent);
        });
      })
      .catch(err => {
        console.error("Error fetching stats:", err);
        document.getElementById("statsCards").innerHTML = 
          `<p class='text-center text-light'>Failed to load data!</p>`;
      });

    // Draw Circle Progress
    function drawCircle(id, percent) {
      const canvas = document.getElementById(id);
      const ctx = canvas.getContext("2d");
      const radius = 60;
      const startAngle = -0.5 * Math.PI;
      const endAngle = (percent / 100) * 2 * Math.PI + startAngle;

      // Background
      ctx.lineWidth = 10;
      ctx.strokeStyle = "rgba(255,255,255,0.2)";
      ctx.beginPath();
      ctx.arc(radius, radius, radius - 10, 0, 2 * Math.PI);
      ctx.stroke();

      // Foreground
      ctx.strokeStyle = "#28a745";
      ctx.beginPath();
      ctx.arc(radius, radius, radius - 10, startAngle, endAngle);
      ctx.stroke();
    }
  </script>

</body>
</html>
