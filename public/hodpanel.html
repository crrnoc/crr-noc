<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HOD Dashboard</title>
  <link rel="icon" href="crrengglogo.png" type="image/png"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #e0eafc, #cfdef3);
      display: flex;
      min-height: 100vh;
      color: #222;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: linear-gradient(180deg, #2C3E50, #34495E);
      padding: 20px;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      color: white;
      transition: all 0.3s ease;
      z-index: 100;
    }

    .sidebar img {
      height: 50px;
      margin: 0 auto 15px auto;
      display: block;
    }

    .sidebar h4 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: bold;
      font-size: 16px;
    }

    .menu a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 12px;
      border-radius: 8px;
      margin: 8px 0;
      transition: all 0.3s ease;
    }

    .menu a:hover,
    .menu .active {
      background: rgba(255,255,255,0.2);
      transform: translateX(5px);
    }

    .logout {
      background-color: #E67E22;
      border: none;
      color: white;
      padding: 12px;
      border-radius: 20px;
      margin-top: auto;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .logout:hover {
      background-color: #CA6F1E;
    }
       /* Overlay behind sidebar */
.overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: 90;
  transition: all 0.3s ease;
}
.overlay.active {
  display: block;
}

/* Blur effect on main content */
.main-content.shifted,
.content.shifted {
  filter: blur(2px);
  pointer-events: none;
}

    /* Toggle Button (Mobile) */
    .mobile-toggle {
      display: none;
      position: fixed;
      top: 15px;
      left: 15px;
      background: #2C3E50;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 200;
    }

    /* Main Content */
    .main-content {
      margin-left: 250px;
      flex: 1;
      padding: 40px;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      font-weight: bold;
      color: #2C3E50;
    }

    /* Card Styles */
    .card-box {
      background: white;
      border-radius: 18px;
      padding: 25px;
      text-align: center;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      margin-bottom: 20px;
      animation: fadeIn 0.6s ease forwards;
    }

    .card-box:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    /* Circle Progress */
    .circle-container {
      position: relative;
      width: 130px;
      height: 130px;
      margin: 0 auto;
    }

    .circle-container canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    .circle-container .percent-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 22px;
      font-weight: bold;
      color: #27AE60;
    }

    .fail-text {
      margin-top: 12px;
      font-weight: bold;
      color: #E74C3C;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    @media (max-width: 768px) {
      .main-content {
        margin-left: 0;
        padding: 20px;
      }
      .sidebar {
        left: -260px;
      }
      .sidebar.open {
        left: 0;
      }
      .mobile-toggle {
        display: block;
      }
    }
  </style>
</head>
<body>

  <!-- Toggle Button -->
  <div class="mobile-toggle" onclick="toggleSidebar()">☰ Menu</div>
 <!-- Overlay -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>


  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <img src="crrengglogo.png" alt="College Logo"/>
    <h4 id="welcomeText">Welcome HOD</h4>
    <div class="menu">
      <a href="hodpanel.html" class="active">🏠 Dashboard</a>
      <a href="students.html">🎓 Students</a>
      <a href="hodbacklogsview.html">📚 Backlogs</a>
    </div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <h2> Department-wise Pass/Fail Statistics</h2>
    <div class="row" id="statsCards"></div>
  </div>

  <script>
    const userId = localStorage.getItem("userId");
    const welcomeText = document.getElementById("welcomeText");

    if (!userId || !userId.startsWith("HOD")) {
      alert("Please login as HOD");
      window.location.href = "index.html";
    } else {
      const dept = userId.replace("HOD", "");
      welcomeText.textContent = `Welcome Head of Department - ${dept}`;
    }

    function logout() {
      localStorage.clear();
      window.location.href = "index.html";
    }

 function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("overlay");
  const mainContent = document.querySelector(".main-content") || document.querySelector(".content");

  sidebar.classList.toggle("open");
  overlay.classList.toggle("active");
  mainContent.classList.toggle("shifted");
}

    // Fetch stats from backend
    fetch(`/hod/pass-fail-stats?staffId=${userId}`)
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("statsCards");
        if (!data.stats || data.stats.length === 0) {
          container.innerHTML = `<p class="text-center text-secondary">No data available!</p>`;
          return;
        }

        data.stats.forEach((branch, i) => {
          const col = document.createElement("div");
          col.className = "col-md-6 col-lg-3";
          col.innerHTML = `
            <div class="card-box">
              <h5 class="mb-3 text-dark">${branch.course}</h5>
              <div class="circle-container">
                <canvas id="circle${i}" width="130" height="130"></canvas>
                <div class="percent-text">${branch.pass_percent}%</div>
              </div>
              <div class="fail-text">Fail: ${branch.fail_percent}%</div>
            </div>
          `;
          container.appendChild(col);
          drawCircle(`circle${i}`, branch.pass_percent);
        });
      })
      .catch(err => {
        console.error("Error fetching stats:", err);
        document.getElementById("statsCards").innerHTML = 
          `<p class='text-center text-danger'>Failed to load data!</p>`;
      });

    // Draw Circle Progress
    function drawCircle(id, percent) {
      const canvas = document.getElementById(id);
      const ctx = canvas.getContext("2d");
      const radius = 60;
      const startAngle = -0.5 * Math.PI;
      const endAngle = (percent / 100) * 2 * Math.PI + startAngle;

      // Background
      ctx.lineWidth = 10;
      ctx.strokeStyle = "#d6eaf8";
      ctx.beginPath();
      ctx.arc(radius, radius, radius - 10, 0, 2 * Math.PI);
      ctx.stroke();

      // Foreground
      ctx.strokeStyle = "#27AE60";
      ctx.beginPath();
      ctx.arc(radius, radius, radius - 10, startAngle, endAngle);
      ctx.stroke();
    }
  </script>

</body>
</html>
