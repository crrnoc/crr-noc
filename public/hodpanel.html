<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HOD Dashboard | Students</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --main-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.15);
      --sidebar-color: rgba(0, 0, 0, 0.6);
      --accent: #3cb6ff;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    body {
      background: linear-gradient(to right top, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      color: #fff;
    }
    .sidebar {
      width: 240px;
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      background: var(--sidebar-color);
      backdrop-filter: blur(12px);
      padding: 30px 20px;
      border-right: 1px solid var(--glass-border);
    }
    .sidebar h2 {
      font-size: 20px;
      margin-bottom: 30px;
      text-align: center;
      color: var(--accent);
    }
    .sidebar a {
      display: block;
      color: #eee;
      text-decoration: none;
      margin: 12px 0;
      padding: 10px 18px;
      border-radius: 10px;
      transition: 0.3s;
    }
    .sidebar a:hover,
    .sidebar a.active {
      background: rgba(255, 255, 255, 0.08);
      color: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }
    .main-content {
      margin-left: 240px;
      padding: 40px;
      flex: 1;
    }
    .welcome-box {
      background: var(--main-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0, 191, 255, 0.1);
      margin-bottom: 30px;
    }
    .welcome-box h2 {
      font-size: 26px;
      color: #00eaff;
      margin-bottom: 10px;
      text-shadow: 0 0 10px rgba(0, 234, 255, 0.5);
    }
    .search-container {
      margin-bottom: 25px;
    }
    .search-container input {
      padding: 10px 15px;
      width: 300px;
      border-radius: 30px;
      border: none;
      font-size: 16px;
    }
    .student-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
    }
    .student-card {
      background: var(--main-bg);
      padding: 20px;
      border-radius: 16px;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      box-shadow: 0 0 15px rgba(0, 191, 255, 0.05);
      transition: 0.3s ease;
    }
    .student-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 25px rgba(0, 234, 255, 0.2);
    }
    .student-card h3 {
      color: #00eaff;
      margin-bottom: 6px;
    }
    .student-card p {
      font-size: 14px;
      margin: 4px 0;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>🛡️ HOD Panel</h2>
    <a href="#" class="active">🎓 Students</a>
    <a href="hodresults.html">📊 Results</a>
  </div>

  <div class="main-content">
    <div class="welcome-box">
      <h2 id="welcomeMsg">Welcome, HOD</h2>
    </div>

    <div class="search-container">
      <input type="text" id="searchInput" placeholder="🔍 Search by Reg No..." />
    </div>

    <div class="student-grid" id="studentGrid"></div>
  </div>

  <script>
    const departmentNames = {
      CSE: "Computer Science and Engineering",
      MECH: "Mechanical Engineering",
      ECE: "Electronics and Communication Engineering",
      EEE: "Electrical and Electronics Engineering",
      CIVIL: "Civil Engineering",
      IT: "Information Technology"
    };

    function getDeptCode(staffId) {
      return staffId.startsWith("HOD") ? staffId.replace("HOD", "").toUpperCase() : null;
    }

    let studentsData = [];

    async function loadStudents() {
      const staffId = localStorage.getItem("userId") || "HODCSE";
      const deptCode = getDeptCode(staffId);
      const deptName = departmentNames[deptCode] || deptCode || "Engineering";

      document.getElementById("welcomeMsg").textContent = `Welcome, Head of the Department of ${deptName}`;

      try {
        const res = await fetch(`https://crr-noc.onrender.com/hod/students?staffId=${encodeURIComponent(staffId)}`);
        const data = await res.json();

        if (!data.students) throw new Error(data.error || "Invalid response");

        studentsData = data.students;
        renderStudents(studentsData);
      } catch (err) {
        console.error("❌ Failed to load students:", err);
        document.getElementById("studentGrid").innerHTML = `<p style="color:#ff6666">⚠️ ${err.message}</p>`;
      }
    }

    function renderStudents(data) {
      const grid = document.getElementById("studentGrid");
      grid.innerHTML = "";

      if (data.length === 0) {
        grid.innerHTML = `<p style="color:#ffc107">⚠️ No students found for this department.</p>`;
        return;
      }

      data.forEach(student => {
        const card = document.createElement("div");
        card.className = "student-card";
        card.innerHTML = `
          <h3>👤 ${student.name}</h3>
          <p><strong>Reg No:</strong> ${student.reg_no}</p>
          <p><strong>Course:</strong> ${student.course}</p>
          <p><strong>Year:</strong> ${student.year}</p>
          <p><strong>Section:</strong> ${student.section}</p>
          <p><strong>Mobile:</strong> ${student.mobile_no}</p>
          <p><strong>Email:</strong> ${student.email}</p>
          <p><strong>Father:</strong> ${student.father_name}</p>
          <p><strong>Father's Mobile:</strong> ${student.father_mobile}</p>
        `;
        grid.appendChild(card);
      });
    }

    document.getElementById("searchInput").addEventListener("input", (e) => {
      const value = e.target.value.toLowerCase();
      const filtered = studentsData.filter(s => s.reg_no.toLowerCase().includes(value));
      renderStudents(filtered);
    });

    window.onload = loadStudents;
  </script>

</body>
</html>
