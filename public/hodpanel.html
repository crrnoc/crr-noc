<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HOD - Student List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .sidebar {
      width: 250px;
      background-color: #343a40;
      color: white;
      padding: 20px;
    }
    .sidebar h4 {
      margin-bottom: 30px;
    }
    .sidebar a {
      color: white;
      display: block;
      margin: 10px 0;
      text-decoration: none;
    }
    .sidebar a:hover {
      text-decoration: underline;
    }
    .main-content {
      flex: 1;
      padding: 30px;
      background-color: #f8f9fa;
    }
    .card {
      margin-bottom: 20px;
    }
    .search-box {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h4 id="welcomeHOD">Welcome HOD</h4>
    <a href="hod_dashboard.html">Dashboard</a>
    <a href="students.html" class="fw-bold">🎓 Students</a>
    <a href="logout.html">Logout</a>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <h2 class="text-primary mb-4">📘 Students in Your Department</h2>

    <input type="text" id="searchInput" class="form-control search-box" placeholder="🔍 Search by name, regno or course..."/>

    <div class="row" id="studentCards"></div>
  </div>

  <script>
    const staffId = localStorage.getItem("userId");
    const welcomeText = document.getElementById("welcomeHOD");
    if (!staffId || !staffId.startsWith("HOD")) {
      alert("❌ You must be logged in as HOD");
      window.location.href = "/login.html";
    } else {
      welcomeText.textContent = `Welcome ${staffId}`;
    }

    let allStudents = [];

    function renderCards(students) {
      const container = document.getElementById("studentCards");
      container.innerHTML = "";
      students.forEach((student) => {
        const col = document.createElement("div");
        col.className = "col-md-6 col-lg-4";

        col.innerHTML = `
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title">${student.name}</h5>
              <p class="card-text">
                <strong>Reg No:</strong> ${student.reg_no}<br>
                <strong>Course:</strong> ${student.course}<br>
                <strong>Year:</strong> ${student.year}, Section: ${student.section}<br>
                <strong>Mobile:</strong> ${student.mobile_no}<br>
                <strong>Email:</strong> ${student.email}<br>
                <strong>Father:</strong> ${student.father_name}, ${student.father_mobile}
              </p>
            </div>
          </div>
        `;
        container.appendChild(col);
      });
    }

    fetch(`/hod/students?staffId=${staffId}`)
      .then((res) => res.json())
      .then((data) => {
        if (!data.students) throw new Error(data.error || "Invalid response");
        allStudents = data.students;
        renderCards(allStudents);
      })
      .catch((err) => {
        console.error("❌ Failed to load students:", err);
        alert("Failed to load students.");
      });

    document.getElementById("searchInput").addEventListener("input", (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = allStudents.filter((s) =>
        s.name.toLowerCase().includes(q) ||
        s.reg_no.toLowerCase().includes(q) ||
        s.course.toLowerCase().includes(q)
      );
      renderCards(filtered);
    });
  </script>
</body>
</html>
