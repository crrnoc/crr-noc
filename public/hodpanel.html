<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HOD Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      display: flex;
      min-height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      padding: 30px 20px;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      z-index: 100;
      box-shadow: 2px 0 12px rgba(0,0,0,0.2);
    }

    .sidebar h4 {
      margin-bottom: 30px;
      font-weight: 600;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .sidebar a:hover {
      background-color: rgba(255,255,255,0.1);
      transform: translateX(5px);
    }

    .logout {
      background-color: #ff6600;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 20px;
      width: 100%;
      margin-top: 40px;
      cursor: pointer;
    }

    .logout:hover {
      background-color: #e65c00;
    }

    /* Main */
    .main-content {
      margin-left: 250px;
      padding: 40px;
      width: 100%;
    }

    .card-box {
      background-color: rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    canvas {
      background-color: white;
      border-radius: 15px;
      padding: 10px;
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding: 20px; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h4 id="welcomeText">Welcome HOD</h4>
    <a href="hodpanel.html">🏠 Dashboard</a>
    <a href="students.html">🎓 Students</a>
    <a href="totalbacklogs.html">📚 Find Backlogs</a>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <h2 class="mb-4 fw-bold">📊 Department-Wise Pass/Fail Statistics</h2>
    <div class="card-box">
      <canvas id="passFailChart" height="150"></canvas>
    </div>
  </div>

  <!-- Script -->
  <script>
    const userId = localStorage.getItem("userId");
    const welcomeText = document.getElementById("welcomeText");

    if (!userId || !userId.startsWith("HOD")) {
      alert("You must be logged in as HOD");
      window.location.href = "index.html";
    } else {
      const dept = userId.replace("HOD", ""); // CSE
      welcomeText.textContent = `Welcome Head of Department - ${dept}`;
    }

    function logout() {
      localStorage.clear();
      window.location.href = "index.html";
    }

    // Fetch stats from backend
    fetch(`/hod/pass-fail-stats?staffId=${userId}`)
      .then(res => res.json())
      .then(data => {
        if (!data.stats || data.stats.length === 0) {
          alert("No data available for this department!");
          return;
        }

        // Prepare chart data
        const labels = data.stats.map(entry => entry.course);
        const passData = data.stats.map(entry => entry.pass_percent);
        const failData = data.stats.map(entry => entry.fail_percent);

        const ctx = document.getElementById("passFailChart").getContext("2d");
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels,
            datasets: [
              {
                label: 'Pass %',
                data: passData,
                backgroundColor: 'rgba(40, 167, 69, 0.7)'
              },
              {
                label: 'Fail %',
                data: failData,
                backgroundColor: 'rgba(220, 53, 69, 0.7)'
              }
            ]
          },
          options: {
            responsive: true,
            scales: {
              y: {
                beginAtZero: true,
                max: 100,
                ticks: { color: '#000' }
              },
              x: {
                ticks: { color: '#000' }
              }
            },
            plugins: {
              legend: {
                labels: { color: '#000' }
              }
            }
          }
        });
      })
      .catch(err => {
        console.error("Failed to load stats:", err);
        alert("Something went wrong fetching stats");
      });
  </script>
</body>
</html>
