<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fee Details - CRR Engineering College</title>
    <link rel="icon" href="crrengglogo.png" type="image/png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.20/dist/sweetalert2.min.css" />
    <style>
        :root {
            --primary-color: #0b2e59;
            --secondary-color: #2c6e91;
            --accent-color: #f7a048;
            --background-dark: #f0f2f5;
            --background-light: #ffffff;
            --text-dark: #333333;
            --text-light: #f4f4f4;
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --border-radius-lg: 16px;
            --border-radius-md: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-dark);
            color: var(--text-dark);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--primary-color);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease-in-out;
            z-index: 1000;
            overflow-y: auto;
        }

        .photo-container {
            display: flex;
            justify-content: center;
            position: relative;
            margin-bottom: 20px;
        }

        .home-icon {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: var(--background-light);
            color: var(--primary-color);
            border-radius: 50%;
            font-size: 22px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, background-color 0.3s ease;
        }

        .home-icon:hover {
            transform: scale(1.1);
            background-color: var(--accent-color);
            color: var(--text-light);
        }

        .sidebar-photo {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        .sidebar h2 {
            margin: 40px 20px 20px 20px;
            color: var(--text-light);
            font-size: 1.1rem;
            font-weight: bold;
        }

        .menu {
            list-style: none;
            padding: 0;
            flex-grow: 1;
        }

        .menu li {
            margin-bottom: 12px;
        }

        .menu li a {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1rem;
            color: var(--text-light);
            padding: 15px 20px;
            border-radius: var(--border-radius-md);
            transition: all 0.3s ease;
        }

        .menu li a:hover,
        .menu li.active a {
            background-color: rgba(255, 255, 255, 0.1);
            font-weight: 500;
            transform: translateX(5px);
            box-shadow: var(--card-shadow);
        }

        .menu li a i {
            font-size: 1.2rem;
            width: 25px;
            text-align: center;
            color: var(--text-light);
        }

        .logout {
            background-color: var(--accent-color);
            color: var(--text-light);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            width: 60%;
            margin: 20px auto 0;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .logout:hover {
            background-color: #d3853b;
            transform: scale(1.05);
        }

        /* Main Content */
        .content {
            margin-left: 280px;
            flex-grow: 1;
            padding: 40px 30px;
            min-height: 100vh;
            background-color: var(--background-dark);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-y: auto;
        }

        .fee-details {
            background-color: var(--background-light);
            color: var(--text-dark);
            padding: 35px 40px;
            border-radius: var(--border-radius-lg);
            width: 90%;
            max-width: 1000px;
            box-shadow: var(--card-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .fee-details:hover {
            transform: scale(1.01);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.25);
        }

        .fee-details h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 2rem;
            color: var(--primary-color);
        }
        
        /* Accordion items */
        .accordion-item {
            margin-bottom: 20px;
        }

        .accordion-toggle {
            background: var(--primary-color);
            color: var(--text-light);
            padding: 15px 20px;
            width: 100%;
            text-align: left;
            border: none;
            border-radius: var(--border-radius-md);
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .accordion-toggle:hover {
            background: var(--secondary-color);
        }
        
        .accordion-toggle .arrow {
            transition: transform 0.3s ease;
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 0 0 var(--border-radius-md) var(--border-radius-md);
            border-top: none;
            padding: 0 20px;
        }

        .accordion-content.open {
            max-height: 600px;
            padding: 20px;
        }

        /* Table styles */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1rem;
            margin-top: 10px;
        }

        thead tr {
            background-color: #eaf1f7;
            color: var(--primary-color);
        }

        th, td {
            padding: 12px 15px;
            text-align: right;
            border-bottom: 1px solid #ddd;
        }

        th:first-child, td:first-child {
            text-align: left;
        }

        tbody tr:hover {
            background-color: #f7f9fc;
        }

        tfoot tr {
            background-color: #dce7f5;
            font-weight: bold;
            color: var(--primary-color);
            border-top: 2px solid #b0c9e6;
        }
        
        /* Mobile View & Responsive Design */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: var(--secondary-color);
            color: var(--text-light);
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        @media (max-width: 992px) {
            .mobile-toggle {
                display: flex;
            }
            .sidebar {
                transform: translateX(-100%);
                width: 250px;
                max-width: 80vw;
                box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .content {
                margin-left: 0;
                padding: 20px;
            }
            .fee-details {
                width: 100%;
                max-width: 100%;
                padding: 20px;
            }
            .accordion-content {
                overflow-x: auto;
            }
            .accordion-content table {
                min-width: 550px; /* Ensure table is readable on small screens */
            }
            .fee-details h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="photo-container">
                <a href="studentwelcome.html" class="home-icon" title="Home">
                    <i class="fas fa-home"></i>
                </a>
                <img id="sidebarPhoto" class="sidebar-photo" alt="Student Photo" style="display: none;" />
            </div>
            <h2>ID: <span id="userId">Loading...</span></h2>
            <nav>
                <ul class="menu">
                    <li><a href="studentdetails.html"><i class="fas fa-user-circle"></i> Student Details</a></li>
                    <li class="active"><a href="#"><i class="fas fa-graduation-cap"></i> Fee Details</a></li>
                    <li><a href="updaterefno.html"><i class="fas fa-sync-alt"></i> Update Fee Payment</a></li>
                    <li><a href="attendence.html"><i class="fas fa-calendar-alt"></i> View Attendance</a></li>
                    <li><a href="studentresults.html"><i class="fas fa-chart-bar"></i> Student Results</a></li>
                    <li><a href="generatenoc.html"><i class="fas fa-file-invoice"></i> Generate NOC</a></li>
                    <li><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
                </ul>
            </nav>
            <button class="logout" onclick="confirmLogout()">Logout</button>
        </aside>

        <main class="content">
            <section class="fee-details">
                <h2>Fee Details</h2>
                <div id="fee-data-container">
                    <p>Loading fee data...</p>
                </div>
            </section>
        </main>
    </div>
    
    <button class="mobile-toggle" aria-label="Toggle navigation menu">☰</button>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.20/dist/sweetalert2.all.min.js"></script>
    <script>
        // DOM elements
        const sidebar = document.querySelector('.sidebar');
        const mobileToggle = document.querySelector('.mobile-toggle');
        const menuLinks = document.querySelectorAll(".menu li a");
        const userIdSpan = document.getElementById("userId");
        const sidebarPhoto = document.getElementById("sidebarPhoto");
        const feeDataContainer = document.getElementById("fee-data-container");

        // UI Functions
        function toggleMobileMenu() {
            sidebar.classList.toggle('open');
            mobileToggle.textContent = sidebar.classList.contains('open') ? '×' : '☰';
        }
        mobileToggle.addEventListener('click', toggleMobileMenu);

        menuLinks.forEach(link => {
            link.addEventListener("click", () => {
                if (window.innerWidth <= 992) {
                    sidebar.classList.remove('open');
                    mobileToggle.textContent = '☰';
                }
            });
        });

        // Logout Confirmation with SweetAlert2
        function confirmLogout() {
            Swal.fire({
                title: 'Are you sure?',
                text: "You will be logged out of your account.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#0b2e59',
                cancelButtonColor: '#f7a048',
                confirmButtonText: 'Yes, log out!'
            }).then((result) => {
                if (result.isConfirmed) {
                    logout();
                }
            });
        }

        // Logout and clear session
        function logout() {
            localStorage.removeItem("userId");
            if ("caches" in window) {
                caches.keys().then(names => names.forEach(name => caches.delete(name)));
            }
            window.location.replace("index.html");
        }

        // Prevent back navigation after logout
        window.history.pushState(null, "", window.location.href);
        window.onpopstate = () => window.history.pushState(null, "", window.location.href);

        // Fetch and render data
        async function fetchStudentData(userId) {
            try {
                const [studentRes, feeRes] = await Promise.all([
                    fetch(`/student/${userId}`),
                    fetch(`/yearwise-fee/${userId}`)
                ]);

                if (!studentRes.ok) {
                    throw new Error('Failed to load student data');
                }
                const studentData = await studentRes.json();
                if (studentData.photo_url) {
                    sidebarPhoto.src = studentData.photo_url;
                    sidebarPhoto.style.display = "block";
                }

                if (!feeRes.ok) {
                    const errorData = await feeRes.json();
                    throw new Error(errorData.message || 'Failed to load fee data');
                }
                const feeData = await feeRes.json();

                if (!feeData.success || !feeData.data || feeData.data.length === 0) {
                    feeDataContainer.innerHTML = '<p>No fee details found for your ID.</p>';
                    Swal.fire({
                        icon: 'info',
                        title: 'No Data',
                        text: 'No fee details were found. Please contact the accounts department.',
                        confirmButtonColor: '#0b2e59'
                    });
                    return;
                }

                renderFeeDetails(feeData.data);

            } catch (err) {
                console.error("Error loading data:", err);
                feeDataContainer.innerHTML = '<p>Something went wrong. Please try again later.</p>';
                Swal.fire({
                    icon: 'error',
                    title: 'Oops...',
                    text: 'Failed to load details. Please contact the administrator.',
                    footer: `<p>${err.message}</p>`,
                    confirmButtonColor: '#0b2e59'
                });
            }
        }

        // Render fee data to the DOM
        function renderFeeDetails(data) {
            feeDataContainer.innerHTML = ''; // Clear loading message

            const feeTypes = [
                { label: "Tuition Fee", key: "tuition" },
                { label: "Hostel Fee", key: "hostel" },
                { label: "Bus Fee", key: "bus" },
                { label: "University Fee", key: "university" },
                { label: "Semester Fee", key: "semester" },
                { label: "Library Dues", key: "library" },
                { label: "Fines", key: "fines" }
            ];

            data.forEach(({ year, structure, paid, fines }, index) => {
                let paidTotal = 0, dueTotal = 0, actualTotal = 0;
                const rowsHTML = feeTypes.map(({ label, key }) => {
                    const total = key === "fines" ? parseFloat(fines) || 0 : parseFloat(structure[key]) || 0;
                    const paidAmt = parseFloat(paid[key]) || 0;
                    const due = Math.max(0, total - paidAmt);

                    paidTotal += paidAmt;
                    dueTotal += due;
                    actualTotal += total;

                    return `
                        <tr>
                            <td>${label}</td>
                            <td>₹${paidAmt.toFixed(2)}</td>
                            <td>₹${due.toFixed(2)}</td>
                            <td>₹${total.toFixed(2)}</td>
                        </tr>
                    `;
                }).join('');

                const accordionHTML = `
                    <div class="accordion-item">
                        <button class="accordion-toggle" aria-expanded="false" data-index="${index}">
                            Academic Year ${year} <span class="arrow">▼</span>
                        </button>
                        <div class="accordion-content">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Fee Type</th>
                                        <th>Paid (₹)</th>
                                        <th>Due (₹)</th>
                                        <th>Total Fee (₹)</th>
                                    </tr>
                                </thead>
                                <tbody>${rowsHTML}</tbody>
                                <tfoot>
                                    <tr>
                                        <td><strong>Total</strong></td>
                                        <td><strong>₹${paidTotal.toFixed(2)}</strong></td>
                                        <td><strong>₹${dueTotal.toFixed(2)}</strong></td>
                                        <td><strong>₹${actualTotal.toFixed(2)}</strong></td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                `;
                feeDataContainer.insertAdjacentHTML('beforeend', accordionHTML);
            });

            // Add event listeners to the newly created accordion buttons
            document.querySelectorAll(".accordion-toggle").forEach(btn => {
                btn.addEventListener("click", () => {
                    const content = btn.nextElementSibling;
                    const arrow = btn.querySelector(".arrow");
                    const isExpanded = btn.getAttribute('aria-expanded') === 'true';

                    // Close all other accordions
                    document.querySelectorAll('.accordion-content.open').forEach(otherContent => {
                        if (otherContent !== content) {
                            otherContent.classList.remove('open');
                            const otherBtn = otherContent.previousElementSibling;
                            otherBtn.setAttribute('aria-expanded', 'false');
                            otherBtn.querySelector('.arrow').textContent = '▼';
                        }
                    });

                    // Toggle the clicked accordion
                    content.classList.toggle("open");
                    btn.setAttribute('aria-expanded', !isExpanded);
                    arrow.textContent = isExpanded ? "▲" : "▼";
                });
            });
        }

        // Initialization
        document.addEventListener("DOMContentLoaded", () => {
            const userId = localStorage.getItem("userId");

            if (!userId) {
                Swal.fire({
                    title: 'Access Denied',
                    text: 'Please login first to view this page.',
                    icon: 'error',
                    confirmButtonText: 'Go to Login',
                    allowOutsideClick: false,
                    allowEscapeKey: false,
                    confirmButtonColor: '#0b2e59'
                }).then(() => {
                    window.location.href = "index.html";
                });
                return;
            }

            userIdSpan.textContent = userId;
            fetchStudentData(userId);
        });
    </script>
</body>
</html>
