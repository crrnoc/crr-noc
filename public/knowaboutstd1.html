<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Know About Student</title>
    <link rel="icon" href="crrengglogo.png" type="image/png" />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.20/dist/sweetalert2.min.css"
    />
    <style>
        :root {
            --primary-color: #0b2e59;
            --secondary-color: #2c6e91;
            --accent-color: #f7a048;
            --background-dark: #f0f2f5;
            --background-light: #ffffff;
            --text-dark: #333333;
            --text-light: #f4f4f4;
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --border-radius-lg: 16px;
            --border-radius-md: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-dark);
            color: var(--text-dark);
        }

        /* Container and Overlay */
        .main-container {
            display: flex;
            min-height: 100vh;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .no-scroll {
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--primary-color);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease-in-out;
            z-index: 1000;
            overflow-y: auto;
        }
        
        /* Home Icon */
        .home-icon {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 1.5rem;
            color: var(--text-light);
            cursor: pointer;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .home-icon:hover {
            color: var(--accent-color);
            transform: scale(1.1);
        }

        .sidebar-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .sidebar h2 {
            margin-top: 15px;
            color: var(--text-light);
            font-size: 1.1rem;
            font-weight: bold;
        }

        .menu {
            list-style: none;
            flex-grow: 1;
        }

        .menu li {
            margin-bottom: 12px;
        }

        .menu li a {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1rem;
            color: var(--text-light);
            padding: 15px 20px;
            border-radius: var(--border-radius-md);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .menu li a:hover,
        .menu li.active a {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            font-weight: 500;
            transform: translateX(5px);
            box-shadow: var(--card-shadow);
        }

        .menu li a i {
            font-size: 1.2rem;
            width: 25px;
            text-align: center;
            color: var(--text-light);
            transition: color 0.3s ease;
        }

        .logout {
            background-color: var(--accent-color);
            color: var(--text-light);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            width: 60%;
            margin: 20px auto 0;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .logout:hover {
            background-color: #d3853b;
            transform: scale(1.05);
        }

        /* Content */
        .content {
            flex-grow: 1;
            background-color: var(--background-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            margin-left: 280px;
            transition: margin-left 0.3s ease;
        }

        .student-info-card {
            background-color: var(--background-light);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--card-shadow);
            padding: 40px;
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .student-info-card h3 {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            padding-left: 40px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius-md);
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 5px rgba(247, 160, 72, 0.5);
        }
        
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        .know-btn {
            background-color: var(--primary-color);
            color: var(--text-light);
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            font-weight: bold;
        }

        .know-btn:hover {
            background-color: var(--secondary-color);
            transform: scale(1.05);
        }

        .mobile-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: var(--secondary-color);
            color: var(--text-light);
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        /* Responsive Styles */
        @media (max-width: 992px) {
            .mobile-toggle {
                display: flex;
            }

            .sidebar {
                transform: translateX(-100%);
                width: 250px;
                max-width: 80vw;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="overlay" onclick="toggleMobileMenu()"></div>

    <div class="main-container">
        <div class="sidebar">
            <a href="staff-dashboard.html" class="home-icon"><i class="fas fa-home"></i></a>
            <div class="sidebar-header">
                <h2 id="staffName">Staff Name</h2>
                <h2 style="margin-top: 5px;">ID: <span id="staffId">Loading...</span></h2>
            </div>
            <ul class="menu">
                <li><a href="staff-dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li class="active"><a href="#"><i class="fas fa-search"></i> Know about Student</a></li>
                <li><a href="editstudentdetails.html"><i class="fas fa-user-edit"></i> Edit Student Details</a></li>
                <li><a href="sendnotification.html"><i class="fas fa-paper-plane"></i> Send Notification</a></li>
                <li><a href="updatefee.html"><i class="fas fa-money-bill-wave"></i> Update Fee</a></li>
                <li><a href="imposefines.html"><i class="fas fa-money-check-alt"></i> Impose Fines</a></li>
                <li><a href="addstudent.html"><i class="fas fa-user-plus"></i> Add Student</a></li>
                <li><a href="mark_attendance.html"><i class="fas fa-clipboard-list"></i> Mark Attendance</a></li>
                <li><a href="backlogs.html"><i class="fas fa-book-open"></i> Find Backlogs</a></li>
                <li><a href="mycounselling.html"><i class="fas fa-handshake"></i> View Counselling</a></li>
                <li><a href="staffsettings.html"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
            <button class="logout" onclick="confirmLogout()">Logout</button>
        </div>

        <div class="content">
            <div class="student-info-card">
                <h3>Find Student Details</h3>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="studentIdInput" placeholder="Enter Registration Number" />
                </div>
                <button class="know-btn" id="fetchStudentBtn">Search</button>
            </div>
        </div>
    </div>
    
    <div class="mobile-toggle" onclick="toggleMobileMenu()">☰</div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.20/dist/sweetalert2.all.min.js"></script>
    <script>
        // Check for login status
        const userId = localStorage.getItem("userId");
        if (!userId) {
            Swal.fire({
                icon: 'error',
                title: 'Access Denied',
                text: 'Please login first to view this page.',
                confirmButtonText: 'Go to Login',
                allowOutsideClick: false,
                allowEscapeKey: false,
                confirmButtonColor: '#0b2e59'
            }).then(() => {
                window.location.href = "index.html";
            });
        } else {
            document.getElementById("staffId").textContent = userId;
            // Fetch and display staff name
            fetch(`/staff/${userId}`) 
                .then(res => res.json())
                .then(data => {
                    if (data.staff_name) {
                        document.getElementById("staffName").textContent = data.staff_name;
                    }
                })
                .catch(err => {
                    console.error("Error loading staff data:", err);
                });

            const fetchBtn = document.getElementById("fetchStudentBtn");
            const studentIdInput = document.getElementById("studentIdInput");

            fetchBtn.addEventListener("click", () => {
                const studentId = studentIdInput.value.trim();
                if (!studentId) {
                    Swal.fire({
                        icon: "warning",
                        title: "No Input",
                        text: "Please enter a student registration number.",
                        confirmButtonColor: '#0b2e59'
                    });
                    return;
                }
                
                // Show a loading spinner
                Swal.fire({
                    title: 'Searching...',
                    text: 'Please wait while we find the student.',
                    didOpen: () => {
                        Swal.showLoading();
                    },
                    allowOutsideClick: false
                });

                fetch(`/student/${studentId}`)
                    .then(res => {
                        if (!res.ok) {
                            throw new Error("Student not found. Please check the Registration Number.");
                        }
                        return res.json();
                    })
                    .then(data => {
                        Swal.close();
                        Swal.fire({
                            title: `${data.name}'s Profile`,
                            html: `
                                <div style="text-align:left; font-size: 1rem; color: #555;">
                                    <p style="margin-bottom: 8px;"><strong>Reg No:</strong> ${data.reg_no || 'N/A'}</p>
                                    <p style="margin-bottom: 8px;"><strong>DOB:</strong> ${data.dob ? new Date(data.dob).toLocaleDateString('en-GB') : 'N/A'}</p>
                                    <p style="margin-bottom: 8px;"><strong>Year:</strong> ${data.year || 'N/A'}</p>
                                    <p style="margin-bottom: 8px;"><strong>Course:</strong> ${data.course || 'N/A'}</p>
                                    <p style="margin-bottom: 8px;"><strong>Semester:</strong> ${data.semester || 'N/A'}</p>
                                    <p style="margin-bottom: 8px;"><strong>Mobile:</strong> ${data.mobile_no || 'N/A'}</p>
                                    <p style="margin-bottom: 8px;"><strong>Email:</strong> ${data.email || 'N/A'}</p>
                                    <p style="margin-bottom: 8px;"><strong>Aadhar:</strong> ${data.aadhar_no || 'N/A'}</p>
                                    <p style="margin-bottom: 8px;"><strong>Admission Type:</strong> ${data.admission_type || 'N/A'}</p>
                                    <p style="margin-bottom: 8px;"><strong>Father Name:</strong> ${data.father_name || 'N/A'}</p>
                                    <p style="margin-bottom: 8px;"><strong>Father Mobile:</strong> ${data.father_mobile || 'N/A'}</p>
                                    <p style="margin-bottom: 8px;"><strong>Counsellor Name:</strong> ${data.counsellor_name || 'N/A'}</p>
                                    <p style="margin-bottom: 8px;"><strong>Counsellor Mobile:</strong> ${data.counsellor_mobile || 'N/A'}</p>
                                </div>`,
                            showCloseButton: true,
                            showConfirmButton: false,
                            width: '90%',
                            maxWidth: '600px',
                            confirmButtonColor: '#0b2e59'
                        });
                    })
                    .catch(err => {
                        Swal.close();
                        Swal.fire({
                            icon: "error",
                            title: "Search Failed",
                            text: err.message,
                            confirmButtonColor: '#0b2e59'
                        });
                    });
            });

            // Toggle mobile sidebar and manage body scroll
            function toggleMobileMenu() {
                const sidebar = document.querySelector('.sidebar');
                const overlay = document.querySelector('.overlay');
                const body = document.body;

                sidebar.classList.toggle('open');
                overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
                body.classList.toggle('no-scroll', sidebar.classList.contains('open'));
            }

            // SweetAlert2 Confirmation for Logout
            function confirmLogout() {
                Swal.fire({
                    title: 'Are you sure?',
                    text: "You will be logged out of your account.",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#0b2e59',
                    cancelButtonColor: '#f7a048',
                    confirmButtonText: 'Yes, log out!'
                }).then((result) => {
                    if (result.isConfirmed) {
                        logout();
                    }
                });
            }

            // Logout function
            function logout() {
                localStorage.clear();
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
