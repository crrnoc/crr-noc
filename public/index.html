<head>
  <meta charset="UTF-8" />
  <title>CRR Student Portal Login | Sir C.R. Reddy College of Engineering</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="crrengglogo.png" type="image/png" />
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Login to the official CRR Engineering College Student Portal to access NOC certificates, attendance, results, and fee payment info. Secure and student-friendly.">
  <meta name="keywords" content="CRR NOC, CRR Engineering Login, Student Portal login, CRR Results, CRR Fee Status, CRR Attendance, Sir CRR College">
  <meta name="author" content="Sir C.R. Reddy College of Engineering">
  <meta name="robots" content="index, follow">

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="CRR Student Portal Login - Sir C.R. Reddy College of Engineering">
  <meta property="og:description" content="Secure login to access CRR student services like results, fee payment, and attendance tracking.">
  <meta property="og:image" content="https://crr-noc.onrender.com/crrengglogo.png">
  <meta property="og:url" content="https://crr-noc.onrender.com/">
  <meta property="og:type" content="website">

  <!-- Canonical Link -->
  <link rel="canonical" href="https://crr-noc.onrender.com/" />

  <!-- Schema.org JSON -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CRR NOC Portal",
      "url": "https://crr-noc.onrender.com",
      "description": "CRR Student Service Portal for downloading NOC certificates, checking attendance, viewing results, and paying college fees.",
      "publisher": {
        "@type": "Organization",
        "name": "Sir C.R. Reddy College of Engineering"
      }
    }
  </script>

  <!-- Fonts and Styles -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet" />
  
  <!-- Include previously provided style (👇 continue after this) -->
 <style>
    :root {
      --main-color: #3cb6ff;
      --accent-color: #ff3d3d;
      --glow: 0 0 15px var(--main-color);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(to right top, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .main-wrapper {
      padding: 60px 20px;
      text-align: center;
      flex: 1;
    }

    .branding img {
      width: 90px;
      margin-bottom: 12px;
      animation: float 2s infinite ease-in-out alternate;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
    }

    @keyframes float {
      0% { transform: translateY(0); }
      100% { transform: translateY(-8px); }
    }

    .branding h1 {
      font-size: 26px;
      color: #fff;
      text-shadow: var(--glow);
    }

    .role-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    .role-button {
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      border: 1px solid transparent;
      cursor: pointer;
      transition: 0.3s;
    }

    .role-button:hover {
      border-color: var(--main-color);
      background: rgba(60, 182, 255, 0.15);
      box-shadow: 0 0 10px var(--main-color);
    }

    .admin-subroles {
      margin-top: 20px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .admin-subroles.show {
      display: flex;
    }

    .login-container {
      max-width: 400px;
      margin: 40px auto 0;
      background: rgba(255, 255, 255, 0.06);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(60,182,255,0.2);
      display: none;
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
    }

    .login-container h2 {
      color: #00eaff;
      margin-bottom: 20px;
    }

    .login-container input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
    }

    .login-container button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--main-color), var(--accent-color));
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
    }

    .footer {
      text-align: center;
      padding: 18px 10px;
      font-size: 14px;
      color: #ccc;
      background: rgba(0, 0, 0, 0.3);
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div class="main-wrapper">

    <!-- Branding -->
    <div class="branding">
      <img src="crrengglogo.png" alt="CRR Logo" />
      <h1>Sir C.R. Reddy College of Engineering</h1>
    </div>

    <!-- Role Selection -->
    <div class="role-buttons">
      <button class="role-button" data-role="student">👨‍🎓 Student</button>
      <button class="role-button" data-role="staff">👨‍🏫 Staff</button>
      <button class="role-button" id="adminButton">🛡️ Admin</button>
    </div>

    <!-- Admin Sub-Role Buttons -->
    <div class="admin-subroles" id="adminSubroles">
      <button class="role-button admin-subrole" data-subrole="administrator">🏢 Administrator</button>
      <button class="role-button admin-subrole" data-subrole="hod">🏫 Dept HOD</button>
      <button class="role-button admin-subrole" data-subrole="exam">📚 Exam Cell</button>
      <button class="role-button admin-subrole" data-subrole="accounts">💰 Accounts</button>
    </div>

    <!-- Student Login -->
    <div class="login-container" id="student-login">
      <h2>Student Login</h2>
      <form onsubmit="submitLogin(event, 'student')">
        <input type="text" placeholder="Student ID" required />
        <input type="password" placeholder="Password" required />
        <button type="submit">Login as Student</button>
      </form>
    </div>

    <!-- Staff Login -->
    <div class="login-container" id="staff-login">
      <h2>Staff Login</h2>
      <form onsubmit="submitLogin(event, 'staff')">
        <input type="text" placeholder="Staff ID" required />
        <input type="password" placeholder="Password" required />
        <button type="submit">Login as Staff</button>
      </form>
    </div>

    <!-- Admin Login (used for all subroles) -->
    <div class="login-container" id="admin-login">
      <h2>Admin Login</h2>
      <form onsubmit="submitLogin(event, 'admin')">
        <input type="text" placeholder="Admin ID" required />
        <input type="password" placeholder="Password" required />
        <button type="submit">Login as Admin</button>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    Developed by CSC 2023-2027 Batch Students | <a href="privacypolicy.html" style="color:#3cb6ff;">Privacy Policy</a>
  </div>

  <!-- JS and SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    const adminBtn = document.getElementById("adminButton");
    const adminSubroles = document.getElementById("adminSubroles");
    const loginContainers = {
      student: document.getElementById("student-login"),
      staff: document.getElementById("staff-login"),
      admin: document.getElementById("admin-login")
    };

    function hideAllLoginContainers() {
      Object.values(loginContainers).forEach(c => c.style.display = 'none');
    }

    // Student & Staff click
    document.querySelectorAll('.role-button[data-role]').forEach(btn => {
      btn.addEventListener('click', () => {
        hideAllLoginContainers();
        adminSubroles.classList.remove("show");
        const role = btn.dataset.role;
        loginContainers[role].style.display = 'block';
      });
    });

    // Admin button click → show subroles
    adminBtn.addEventListener("click", () => {
      hideAllLoginContainers();
      adminSubroles.classList.toggle("show");
    });

    // Subrole click → open login form
    document.querySelectorAll('.admin-subrole').forEach(btn => {
      btn.addEventListener('click', () => {
        hideAllLoginContainers();
        loginContainers.admin.style.display = 'block';
        // Save selected subrole to session/localStorage
        localStorage.setItem("adminRole", btn.dataset.subrole);
      });
    });

    // Submit login form
    async function submitLogin(event, role) {
      event.preventDefault();
      const form = event.target;
      const userId = form.querySelector("input[type='text']").value.trim();
      const password = form.querySelector("input[type='password']").value.trim();

      const payload = { userId, password, role };
      if (role === "admin") {
        payload.subRole = localStorage.getItem("adminRole");
      }

      try {
        const response = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();

        if (data.success) {
          Swal.fire({
            icon: "success",
            title: "Login Successful!",
            text: `Welcome ${data.userId}`,
            timer: 1800,
            showConfirmButton: false
          });

          // Save session
          localStorage.setItem("userId", data.userId);
          localStorage.setItem("role", data.role);
          if (data.subRole) localStorage.setItem("adminRole", data.subRole);

          // Redirect based on role & subrole
          if (data.role === "student") window.location.href = "studentwelcome.html";
          else if (data.role === "staff") window.location.href = "knowaboutstd1.html";
          else if (data.role === "admin") {
            if (data.subRole === "administrator") window.location.href = "adminpanel.html";
            else if (data.subRole === "hod") window.location.href = "hodpanel.html";
            else if (data.subRole === "exam") window.location.href = "examcell.html";
            else if (data.subRole === "accounts") window.location.href = "accountspanel.html";
          }

        } else {
          Swal.fire({
            icon: "error",
            title: "Login Failed",
            text: data.message || "Invalid credentials",
            confirmButtonColor: "#d33"
          });
        }

      } catch (error) {
        console.error("Login Error:", error);
        Swal.fire({
          icon: "error",
          title: "Error",
          text: "Something went wrong!",
        });
      }
    }
  </script>
</body>
</html>
