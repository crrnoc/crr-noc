<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧑‍🏫 Staff Period Allocation</title>
  <link rel="icon" href="crrengglogo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background-color: #f1f1f1;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100%;
      background-color: #20232a;
      padding-top: 20px;
      color: white;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 20px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar ul li {
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 1px solid #333;
    }

    .sidebar ul li:hover, .sidebar ul li.active {
      background-color: #4a90e2;
    }

    .main {
      margin-left: 260px;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
      font-size: 26px;
    }

    form {
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, select, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    label {
      margin-top: 10px;
      display: block;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .topbar {
      background-color: #007bff;
      padding: 10px 20px;
      color: white;
      font-size: 18px;
      margin-left: 260px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>🧑‍💼 Admin Panel</h2>
    <ul>
      <li onclick="navigateTo('/dashboard')">🏠 Dashboard</li>
      <li onclick="navigateTo('/uploadattendance')">📤 Upload Attendance</li>
      <li onclick="navigateTo('/uploadmidmarks')">📥 Upload Mid Marks</li>
      <li onclick="navigateTo('/uploadstudentdata')">👨‍🎓 Upload Student Data</li>
      <li class="active">🧑‍🏫 Staff Period Allocation</li>
    </ul>
  </div>

  <div class="topbar">🧑‍🏫 Staff Period Allocation</div>

  <div class="main">
    <form id="allocationForm">
      <h1>Allocate Periods to Staff</h1>

      <label>Staff ID</label>
      <input type="text" name="staff_id" id="staff_id" required />

      <label>Staff Name</label>
      <input type="text" name="staff_name" id="staff_name" readonly />

      <label>Department</label>
      <select name="dept_code" id="dept_code" required></select>

      <label>Course</label>
      <select name="course" id="course" required></select>

      <label>Year</label>
      <select name="year" id="year" required></select>

      <label>Section</label>
      <select name="section" id="section" required></select>

      <label>Day</label>
      <select name="day" required>
        <option value="">Select</option>
        <option value="Monday">Monday</option>
        <option value="Tuesday">Tuesday</option>
        <option value="Wednesday">Wednesday</option>
        <option value="Thursday">Thursday</option>
        <option value="Friday">Friday</option>
        <option value="Saturday">Saturday</option>
      </select>

      <label>Period 1</label><input type="text" name="period1">
      <label>Period 2</label><input type="text" name="period2">
      <label>Period 3</label><input type="text" name="period3">
      <label>Period 4</label><input type="text" name="period4">
      <label>Period 5</label><input type="text" name="period5">
      <label>Period 6</label><input type="text" name="period6">
      <label>Period 7</label><input type="text" name="period7">

      <button type="submit">Allocate</button>
    </form>
  </div>

  <script>
    const baseUrl = "https://crr-noc.onrender.com";

    async function fetchStaffName(id) {
      const res = await fetch(`${baseUrl}/api/staff/${id}`);
      const data = await res.json();
      document.getElementById('staff_name').value = data.staff_name || '';
    }

    document.getElementById("staff_id").addEventListener("blur", e => {
      const id = e.target.value;
      if (id) fetchStaffName(id);
    });

    async function populateDropdown(url, selectEl, key) {
      const res = await fetch(url);
      const data = await res.json();
      selectEl.innerHTML = '<option value="">Select</option>' +
        data.map(d => `<option value="${d[key]}">${d[key]}</option>`).join('');
    }

    document.addEventListener("DOMContentLoaded", () => {
      populateDropdown(`${baseUrl}/api/departments`, document.getElementById('dept_code'), 'dept_code');

      document.getElementById('dept_code').addEventListener('change', e => {
        const dept = e.target.value;
        populateDropdown(`${baseUrl}/api/courses/${dept}`, document.getElementById('course'), 'course');
      });

      document.getElementById('course').addEventListener('change', () => {
        const dept = document.getElementById('dept_code').value;
        const course = document.getElementById('course').value;
        fetch(`${baseUrl}/api/year-section?dept_code=${dept}&course=${course}`)
          .then(res => res.json())
          .then(data => {
            const yearSel = document.getElementById('year');
            const sectionSel = document.getElementById('section');
            yearSel.innerHTML = '<option value="">Select</option>';
            sectionSel.innerHTML = '<option value="">Select</option>';
            data.forEach(row => {
              if (!yearSel.innerHTML.includes(row.year)) {
                yearSel.innerHTML += `<option value="${row.year}">${row.year}</option>`;
              }
              sectionSel.innerHTML += `<option value="${row.section}">${row.section}</option>`;
            });
          });
      });
    });

    document.getElementById("allocationForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      const res = await fetch(`${baseUrl}/api/allocate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const result = await res.json();
      if (result.success) {
        Swal.fire("✅ Success", result.message, "success");
        e.target.reset();
      } else {
        Swal.fire("❌ Error", result.error || "Failed to allocate.", "error");
      }
    });

    function navigateTo(path) {
      window.location.href = path;
    }
  </script>
</body>
</html>
