<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧑‍🏫 Staff Period Allocation</title>
  <link rel="icon" href="crrengglogo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
 <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    display: flex;
    min-height: 100vh;
    background: linear-gradient(to right, #e0eafc, #cfdef3);
    color: #222;
    overflow-x: hidden;
  }

  .sidebar {
    width: 250px;
    background: linear-gradient(180deg, #2C3E50, #34495E);
    padding: 20px;
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    color: white;
    z-index: 100;
  }

  .sidebar h2 {
    text-align: center;
    font-weight: bold;
    font-size: 20px;
    margin-bottom: 30px;
    color: #3cb6ff;
  }

  .sidebar ul {
    list-style: none;
    padding: 0;
  }

  .sidebar li {
    display: block;
    padding: 12px;
    border-radius: 8px;
    margin: 8px 0;
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.1);
  }

  .sidebar li:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: translateX(5px);
  }

  .sidebar li.active {
    background: rgba(255, 255, 255, 0.3);
    font-weight: bold;
  }

  .sidebar button {
    background-color: #E67E22;
    border: none;
    color: white;
    padding: 12px;
    border-radius: 20px;
    margin-top: auto;
    cursor: pointer;
    transition: background 0.3s ease;
  }

  .sidebar button:hover {
    background-color: #CA6F1E;
  }

  .mobile-toggle {
    display: none;
    position: fixed;
    top: 15px;
    left: 15px;
    background: #2C3E50;
    color: white;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    z-index: 200;
  }

  .main {
    flex: 1;
    margin-left: 250px;
    padding: 40px;
    margin-top: 36px;
    transition: filter 0.3s ease;
  }

  .main.shifted {
    filter: blur(2px);
    pointer-events: none;
  }

  form {
    background: white;
    padding: 25px;
    border-radius: 16px;
    max-width: 700px;
    margin: auto;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
  }

  h1 {
    font-size: 24px;
    margin-bottom: 20px;
    text-align: center;
    color: #333;
  }

  label {
    display: block;
    margin-top: 15px;
    font-weight: 500;
  }

  input, select, button {
    padding: 10px;
    margin-top: 5px;
    width: 100%;
    border: 1px solid #ccc;
    border-radius: 6px;
  }

  button {
    margin-top: 25px;
    background-color: #007bff;
    color: white;
    font-weight: bold;
    border: none;
    transition: background 0.3s ease;
  }

  button:hover {
    background-color: #0056b3;
  }

  @media (max-width: 768px) {
    .sidebar { left: -250px; transition: 0.4s ease; }
    .sidebar.open { left: 0; }
    .mobile-toggle { display: block; }
    .main { margin-left: 0; padding: 80px 20px 20px; }
  }
</style>
</head>
<div class="mobile-toggle" onclick="toggleSidebar()">☰</div>

<div class="sidebar" id="sidebar">
  <h2>Admin Panel</h2>
  <ul>
      <li onclick="navigateTo('/uploadattendance')">🗓 Upload Attendance</li>
      <li onclick="navigateTo('/uploadmidmarks')">📊 Upload Mid Marks</li>
      <li onclick="navigateTo('/addmycounselling')">👥 Assign Counselling</li>
      <li onclick="navigateTo('/dumatch')">📊 DU Match Status</li>
      <li onclick="navigateTo('/removestudents')">🗑️ Delete Students</li>
      <li onclick="navigateTo('/uploadstudents')">📚 Upload Student Data</li>
      <li onclick="navigateTo('/staffallocation')">🧑‍🏫 Staff Period Allocation</li>
  </ul>
  <button onclick="logout()">🚪 Logout</button>
</div>

<div class="main" id="main-content">
  <form id="allocationForm">
    <h1>Allocate Periods to Staff</h1>

    <label>Staff ID</label>
    <input type="text" name="staff_id" id="staff_id" required />

    <label>Staff Name</label>
    <input type="text" name="staff_name" id="staff_name" readonly />

    <label>Department</label>
    <select name="dept_code" id="dept_code" required></select>

    <label>Course</label>
    <select name="course" id="course" required></select>

    <label>Year</label>
    <select name="year" id="year" required></select>

    <label>Section</label>
    <select name="section" id="section" required></select>

    <label>Semester</label>
    <select name="semester" id="semester" required>
      <option value="" selected disabled>Select Semester</option>
      <option value="1-1">1-1</option>
      <option value="1-2">1-2</option>
      <option value="2-1">2-1</option>
      <option value="2-2">2-2</option>
      <option value="3-1">3-1</option>
      <option value="3-2">3-2</option>
      <option value="4-1">4-1</option>
      <option value="4-2">4-2</option>
    </select>

    <label>Day</label>
    <select name="day" required>
      <option value="">Select</option>
      <option value="Monday">Monday</option>
      <option value="Tuesday">Tuesday</option>
      <option value="Wednesday">Wednesday</option>
      <option value="Thursday">Thursday</option>
      <option value="Friday">Friday</option>
      <option value="Saturday">Saturday</option>
    </select>

    <label>Period 1</label><input type="text" name="period1">
    <label>Period 2</label><input type="text" name="period2">
    <label>Period 3</label><input type="text" name="period3">
    <label>Period 4</label><input type="text" name="period4">
    <label>Period 5</label><input type="text" name="period5">
    <label>Period 6</label><input type="text" name="period6">
    <label>Period 7</label><input type="text" name="period7">

    <button type="submit">Allocate</button>
  </form>
</div>
<script>
  const baseUrl = "https://crr-noc.onrender.com";

  const userId = localStorage.getItem("userId");
  if (!userId) {
    alert("Please login first.");
    window.location.href = "index.html";
  }

  function navigateTo(route) {
    window.location.href = route;
  }

  function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    const main = document.getElementById("main-content");
    sidebar.classList.toggle("open");
    main.classList.toggle("shifted");
  }

  function logout() {
    fetch("/logout")
      .then(() => {
        localStorage.removeItem("userId");
        window.location.replace("index.html");
      })
      .catch((err) => {
        console.error("Logout failed:", err);
        alert("Logout failed. Try again.");
      });
  }

  // Prevent back nav after logout
  window.history.pushState(null, "", window.location.href);
  window.onpopstate = function () {
    window.history.pushState(null, "", window.location.href);
  };

  // 👇 Auto-fetch staff name when ID is entered
  document.getElementById("staff_id").addEventListener("blur", async function () {
    const id = this.value;
    if (!id) return;
    try {
      const res = await fetch(`${baseUrl}/api/staff/${id}`);
      const data = await res.json();
      document.getElementById("staff_name").value = data.staff_name || "";
    } catch (err) {
      document.getElementById("staff_name").value = "";
      console.error("Error fetching staff:", err);
    }
  });

  // Load departments on window load
  window.onload = async function () {
    try {
      const res = await fetch(`${baseUrl}/api/departments`);
      const data = await res.json();
      const deptSel = document.getElementById("dept_code");
      deptSel.innerHTML = `<option value="">Select</option>`;
      data.forEach(d => {
        deptSel.innerHTML += `<option value="${d.dept_code}">${d.dept_code}</option>`;
      });
    } catch (err) {
      console.error("Failed to load departments", err);
    }
  };

  // Department -> Year
  document.getElementById("dept_code").addEventListener("change", async function () {
    const dept = this.value;
    const yearSel = document.getElementById("year");
    const courseSel = document.getElementById("course");
    const sectionSel = document.getElementById("section");

    yearSel.innerHTML = `<option value="">Loading...</option>`;
    courseSel.innerHTML = `<option value="">Select</option>`;
    sectionSel.innerHTML = `<option value="">Select</option>`;

    try {
      const res = await fetch(`${baseUrl}/api/years/${dept}`);
      const data = await res.json();
      yearSel.innerHTML = `<option value="">Select</option>`;
      data.forEach(d => {
        yearSel.innerHTML += `<option value="${d.year}">${d.year}</option>`;
      });
    } catch (err) {
      console.error("Error loading years", err);
    }
  });

  // Year -> Course
  document.getElementById("year").addEventListener("change", async function () {
    const dept = document.getElementById("dept_code").value;
    const year = this.value;
    const courseSel = document.getElementById("course");
    const sectionSel = document.getElementById("section");

    courseSel.innerHTML = `<option value="">Loading...</option>`;
    sectionSel.innerHTML = `<option value="">Select</option>`;

    try {
      const res = await fetch(`${baseUrl}/api/courses-by-year?dept_code=${dept}&year=${year}`);
      const data = await res.json();
      courseSel.innerHTML = `<option value="">Select</option>`;
      data.forEach(d => {
        courseSel.innerHTML += `<option value="${d.course}">${d.course}</option>`;
      });
    } catch (err) {
      console.error("Error loading courses", err);
    }
  });

  // Course -> Section
  document.getElementById("course").addEventListener("change", async function () {
    const dept = document.getElementById("dept_code").value;
    const year = document.getElementById("year").value;
    const course = this.value;
    const sectionSel = document.getElementById("section");

    sectionSel.innerHTML = `<option value="">Loading...</option>`;

    try {
      const res = await fetch(`${baseUrl}/api/sections?dept_code=${dept}&year=${year}&course=${course}`);
      const data = await res.json();
      sectionSel.innerHTML = `<option value="">Select</option>`;
      data.forEach(d => {
        sectionSel.innerHTML += `<option value="${d.section}">${d.section}</option>`;
      });
    } catch (err) {
      console.error("Error loading sections", err);
    }
  });

  // Submit the allocation
  document.getElementById("allocationForm").addEventListener("submit", async function (e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    try {
      const res = await fetch(`${baseUrl}/api/allocate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const result = await res.json();

      if (result.success) {
        Swal.fire("✅ Success", result.message, "success");
        this.reset();
      } else {
        Swal.fire("❌ Failed", result.error || "Allocation failed", "error");
      }
    } catch (err) {
      Swal.fire("❌ Error", "Server/Network error", "error");
      console.error("Submit failed", err);
    }
  });
</script>

</body>
</html>
