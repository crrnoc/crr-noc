<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🧑‍🏫 Staff Period Allocation</title>
  <link rel="icon" href="crrengglogo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background-color: #f1f1f1;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100%;
      background-color: #20232a;
      padding-top: 20px;
      color: white;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 20px;
    }

    .sidebar ul {
      list-style: none;
      padding: 0;
    }

    .sidebar ul li {
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 1px solid #333;
    }

    .sidebar ul li:hover, .sidebar ul li.active {
      background-color: #4a90e2;
    }

    .main {
      margin-left: 260px;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
      font-size: 26px;
    }

    form {
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, select, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    label {
      margin-top: 10px;
      display: block;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      margin-top: 20px;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: left;
    }

    th {
      background-color: #007bff;
      color: white;
    }

    .topbar {
      background-color: #007bff;
      padding: 10px 20px;
      color: white;
      font-size: 18px;
      margin-left: 260px;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h2>🧑‍💼 Admin Panel</h2>
    <ul>
      <li onclick="navigateTo('/dashboard')">🏠 Dashboard</li>
      <li onclick="navigateTo('/uploadattendance')">📤 Upload Attendance</li>
      <li onclick="navigateTo('/uploadmidmarks')">📥 Upload Mid Marks</li>
      <li onclick="navigateTo('/uploadstudentdata')">👨‍🎓 Upload Student Data</li>
      <li class="active">🧑‍🏫 Staff Period Allocation</li>
    </ul>
  </div>

  <div class="topbar">🧑‍🏫 Staff Period Allocation</div>

  <div class="main">
    <form id="allocationForm">
      <h1>Allocate Periods to Staff</h1>
      <label>Year</label>
      <input type="text" name="year" required />

      <label>Department Code</label>
      <input type="text" name="dept_code" required />

      <label>Course</label>
      <input type="text" name="course" required />

      <label>Section</label>
      <input type="text" name="section" required />

      <label>Day</label>
      <select name="day" required>
        <option value="">Select</option>
        <option value="Monday">Monday</option>
        <option value="Tuesday">Tuesday</option>
        <option value="Wednesday">Wednesday</option>
        <option value="Thursday">Thursday</option>
        <option value="Friday">Friday</option>
        <option value="Saturday">Saturday</option>
      </select>

      <label>Staff ID</label>
      <input type="text" name="staff_id" required />

      <label>Staff Name</label>
      <input type="text" name="staff_name" required />

      <label>Period 1</label>
      <input type="text" name="period1" />
      <label>Period 2</label>
      <input type="text" name="period2" />
      <label>Period 3</label>
      <input type="text" name="period3" />
      <label>Period 4</label>
      <input type="text" name="period4" />
      <label>Period 5</label>
      <input type="text" name="period5" />
      <label>Period 6</label>
      <input type="text" name="period6" />
      <label>Period 7</label>
      <input type="text" name="period7" />

      <button type="submit">Allocate</button>
    </form>

    <form id="fetchForm">
      <h2>📋 View Staff Period Allocation</h2>
      <label>Year</label>
      <input type="text" name="year" required />

      <label>Department Code</label>
      <input type="text" name="dept_code" required />

      <label>Course</label>
      <input type="text" name="course" required />

      <label>Section</label>
      <input type="text" name="section" required />

      <label>Day</label>
      <select name="day" required>
        <option value="">Select</option>
        <option value="Monday">Monday</option>
        <option value="Tuesday">Tuesday</option>
        <option value="Wednesday">Wednesday</option>
        <option value="Thursday">Thursday</option>
        <option value="Friday">Friday</option>
        <option value="Saturday">Saturday</option>
      </select>

      <button type="submit">Fetch</button>
    </form>

    <div id="allocationTable"></div>
  </div>

  <script>
    const baseUrl = "https://crr-noc.onrender.com"; // change to your server URL

    document.getElementById("allocationForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      const response = await fetch(`${baseUrl}/api/staff-period-allocation`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });

      const result = await response.json();
      if (result.success) {
        Swal.fire("✅ Success", "Period allocation saved!", "success");
        e.target.reset();
      } else {
        Swal.fire("❌ Error", "Failed to save allocation.", "error");
      }
    });

    document.getElementById("fetchForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const params = new URLSearchParams(formData);
      const response = await fetch(`${baseUrl}/api/staff-period-allocation?${params}`);
      const result = await response.json();

      if (result.success && result.data.length > 0) {
        let table = "<table><tr><th>Staff ID</th><th>Staff Name</th>";
        for (let i = 1; i <= 7; i++) table += `<th>Period ${i}</th>`;
        table += "</tr>";

        result.data.forEach(row => {
          table += `<tr>
            <td>${row.staff_id}</td>
            <td>${row.staff_name}</td>
            <td>${row.period1 || ''}</td>
            <td>${row.period2 || ''}</td>
            <td>${row.period3 || ''}</td>
            <td>${row.period4 || ''}</td>
            <td>${row.period5 || ''}</td>
            <td>${row.period6 || ''}</td>
            <td>${row.period7 || ''}</td>
          </tr>`;
        });

        table += "</table>";
        document.getElementById("allocationTable").innerHTML = table;
      } else {
        document.getElementById("allocationTable").innerHTML = "<p>No allocation data found.</p>";
      }
    });

    function navigateTo(path) {
      window.location.href = path;
    }
  </script>
</body>
</html>
