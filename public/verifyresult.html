<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CRR - Verified Result</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f8f9fa;
      color: #333;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      padding: 40px 50px;
      border-radius: 12px;
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.1);
      position: relative;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      margin: 0;
      color: #007bff;
      border-bottom: 2px solid #007bff;
      display: inline-block;
      padding-bottom: 5px;
    }

    .photo {
      position: absolute;
      top: 40px;
      right: 50px;
      width: 110px;
      height: 130px;
      border-radius: 6px;
      border: 2px solid #ccc;
      object-fit: cover;
      display: none;
    }

    .info p {
      margin: 8px 0;
      font-size: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
      font-size: 15px;
    }

    th, td {
      border: 1px solid #dee2e6;
      padding: 12px 10px;
      text-align: center;
    }

    th {
      background-color: #f1f4f9;
      color: #333;
      font-weight: 600;
    }

    tr:nth-child(even) {
      background-color: #f9fbfc;
    }

    .sgpa {
      margin-top: 35px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      color: #28a745;
    }

    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 13px;
      color: #777;
    }

    @media (max-width: 600px) {
      .container {
        padding: 25px 20px;
      }

      .photo {
        position: static;
        display: block !important;
        margin: 0 auto 20px;
      }

      .header h1 {
        font-size: 22px;
      }

      .info p {
        font-size: 15px;
      }

      th, td {
        font-size: 13px;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="resultContainer">
    <div class="header">
      <h1>✅ Verified Student Result</h1>
    </div>

    <img id="photo" class="photo" src="" alt="Student Photo" />

    <div class="info" id="studentInfo">
      <!-- JS will inject info here -->
    </div>

    <table id="resultTable">
      <thead>
        <tr>
          <th>S.No</th>
          <th>Subject Code</th>
          <th>Subject Name</th>
          <th>Grade</th>
          <th>Credits</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="sgpa" id="sgpaSection"></div>

    <div class="footer">
      Verified by CRR NOC | Generated on <span id="date"></span>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const regno = urlParams.get('regno');
    const sem = urlParams.get('sem');

    if (!regno || !sem) {
      document.getElementById("resultContainer").innerHTML =
        "<h3 style='color:red; text-align:center;'>❌ Invalid or missing parameters in URL.</h3>";
    } else {
      fetch(`https://crr-noc.onrender.com/api/verify-result?regno=${regno}&sem=${sem}`)
        .then(res => res.json())
        .then(data => {
          if (!data || !data.results) throw new Error("Invalid result data");

          // Fill Student Info
          const infoHTML = `
            <p><strong>Name:</strong> ${data.name}</p>
            <p><strong>Reg. No:</strong> ${data.regno}</p>
            <p><strong>Course:</strong> ${data.course}</p>
            <p><strong>Semester:</strong> ${data.semester}</p>
          `;
          document.getElementById("studentInfo").innerHTML = infoHTML;

          // Set Photo
          if (data.photo_url) {
            const photo = document.getElementById("photo");
            photo.src = data.photo_url;
            photo.style.display = "block";
          }

          // Result Table
          const tbody = document.querySelector("#resultTable tbody");
          data.results.forEach((row, i) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td>${i + 1}</td>
              <td>${row.subcode}</td>
              <td>${row.subname}</td>
              <td>${row.grade}</td>
              <td>${row.credits}</td>
            `;
            tbody.appendChild(tr);
          });

          // SGPA
          document.getElementById("sgpaSection").textContent =
            `SEMESTER GRADE POINT AVERAGE (SGPA): ${data.sgpa}`;

          // Date
          document.getElementById("date").textContent =
            new Date().toLocaleDateString("en-GB");
        })
        .catch(err => {
          console.error("❌ Fetch error:", err);
          document.getElementById("resultContainer").innerHTML =
            "<h3 style='color:red; text-align:center;'>❌ Failed to fetch result data.</h3>";
        });
    }
  </script>
</body>
</html>
