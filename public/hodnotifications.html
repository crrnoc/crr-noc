<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>📢 HOD Notifications</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f1f1f1;
      padding: 20px;
    }
    .container {
      background: #fff;
      max-width: 600px;
      margin: 40px auto;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 25px;
    }
    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #1976d2;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .message {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
    }
    .error {
      color: red;
    }
    .success {
      color: green;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>📢 Send Notification</h2>
    <label for="userId">HOD User ID (e.g., HODCSE)</label>
    <input type="text" id="userId" placeholder="Enter your User ID" />

    <label for="message">Notification Message</label>
    <textarea id="message" rows="5" placeholder="Enter your message here"></textarea>

    <button onclick="sendNotification()">Send</button>

    <div id="responseMsg" class="message"></div>
  </div>

  <script>
    async function sendNotification() {
      const userId = document.getElementById('userId').value.trim();
      const message = document.getElementById('message').value.trim();
      const responseMsg = document.getElementById('responseMsg');
      responseMsg.textContent = '';
      responseMsg.className = 'message';

      if (!userId || !message) {
        responseMsg.textContent = 'Please fill in all fields.';
        responseMsg.classList.add('error');
        return;
      }

      try {
        const res = await fetch('/api/notifications/send', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ userId, message })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          responseMsg.textContent = '✅ Notification sent successfully!';
          responseMsg.classList.add('success');
          document.getElementById('message').value = '';
        } else {
          responseMsg.textContent = data.message || '❌ Failed to send notification.';
          responseMsg.classList.add('error');
        }
      } catch (err) {
        console.error('Error sending notification:', err);
        responseMsg.textContent = '❌ Server error. Try again later.';
        responseMsg.classList.add('error');
      }
    }
  </script>
</body>
</html>
