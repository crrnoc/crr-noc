<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>📢 HOD Notifications</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="crrengglogo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f0f2f5;
      margin: 0;
      padding: 0;
    }

    .navbar {
      background-color: #003366;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar h2 {
      margin: 0;
      font-size: 22px;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    h3 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 150px;
      padding: 10px;
      font-size: 16px;
      resize: vertical;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      width: 100%;
      background: #0066cc;
      color: #fff;
      border: none;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #004d99;
    }

    .success {
      margin-top: 20px;
      text-align: center;
      color: green;
    }

    .error {
      margin-top: 20px;
      text-align: center;
      color: red;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <h2 id="welcomeText">Welcome Head of Department</h2>
    <button onclick="logout()" style="background:#cc0000; color:white; padding:8px 16px; border:none; border-radius:6px; cursor:pointer;">Logout</button>
  </div>

  <div class="container">
    <h3>Send Notification to Students</h3>
    <form id="notificationForm">
      <textarea name="message" placeholder="Enter notification message here..." required></textarea>
      <button type="submit">Send Notification</button>
    </form>
    <div id="responseMsg"></div>
  </div>

  <script>
    const staffId = localStorage.getItem("userId"); // Ex: "HODCSE"
    const welcomeText = document.getElementById("welcomeText");

    if (!staffId || !staffId.startsWith("HOD")) {
      alert("❌ Please login as HOD");
      window.location.href = "index.html";
    } else {
      const dept = staffId.replace("HOD", "");
      welcomeText.textContent = `Welcome Head of Department - ${dept}`;
    }

    function logout() {
      localStorage.clear();
      window.location.href = "index.html";
    }

    const form = document.getElementById('notificationForm');
    const responseMsg = document.getElementById('responseMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = form.message.value.trim();

      if (!message) {
        responseMsg.innerHTML = `<p class="error">Message cannot be empty</p>`;
        return;
      }

      try {
        const res = await fetch('/api/notifications/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, userId: staffId })
        });

        const data = await res.json();
        if (data.success) {
          responseMsg.innerHTML = `<p class="success">✅ Notification sent successfully!</p>`;
          form.reset();
        } else {
          responseMsg.innerHTML = `<p class="error">❌ Failed to send notification</p>`;
        }
      } catch (err) {
        console.error('Error:', err);
        responseMsg.innerHTML = `<p class="error">❌ Something went wrong</p>`;
      }
    });
  </script>

</body>
</html>
