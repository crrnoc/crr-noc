<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>📢 HOD Notifications</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="crrengglogo.png" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f1f5f9;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 700px;
      margin: 50px auto;
      background-color: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
    h2 {
      text-align: center;
      color: #1e293b;
    }
    label {
      display: block;
      margin-top: 20px;
      font-weight: 500;
      color: #334155;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 16px;
    }
    textarea {
      resize: vertical;
      height: 120px;
    }
    button {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background-color: #0284c7;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0369a1;
    }
    .status {
      margin-top: 20px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>📢 Send Notification</h2>
    <form id="notificationForm">
      <label for="userId">HOD User ID (e.g., HODCSE):</label>
      <input type="text" id="userId" name="userId" required />

      <label for="message">Notification Message:</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit">Send Notification</button>
    </form>
    <div class="status" id="statusMsg"></div>
  </div>

  <script>
    const form = document.getElementById('notificationForm');
    const statusMsg = document.getElementById('statusMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const userId = document.getElementById('userId').value.trim();
      const message = document.getElementById('message').value.trim();

      if (!userId || !message) {
        statusMsg.textContent = "Please fill in all fields.";
        statusMsg.style.color = "red";
        return;
      }

      try {
        const response = await fetch('/api/notifications/send', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ userId, message })
        });

        const result = await response.json();

        if (result.success) {
          statusMsg.textContent = "✅ Notification sent successfully!";
          statusMsg.style.color = "green";
          form.reset();
        } else {
          statusMsg.textContent = "❌ Failed to send notification.";
          statusMsg.style.color = "red";
        }
      } catch (err) {
        console.error('Request error:', err);
        statusMsg.textContent = "❌ Error sending notification.";
        statusMsg.style.color = "red";
      }
    });
  </script>
</body>
</html>
