<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>📢 Send Notification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="crrengglogo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 80px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 25px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #444;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 18px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background-color: #2d89ef;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background-color: #1b5cb8;
    }
    .alert {
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      font-weight: 600;
      text-align: center;
    }
    .alert.success {
      background-color: #d4edda;
      color: #155724;
    }
    .alert.error {
      background-color: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>📢 Send Notification</h2>
    <form id="notificationForm">
      <label for="userId">HOD ID</label>
      <input type="text" id="userId" name="userId" placeholder="e.g., HODCSE001" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" placeholder="Enter your notification message..." required></textarea>

      <button type="submit">Send</button>
      <div id="responseMessage" class="alert" style="display: none;"></div>
    </form>
  </div>

  <script>
    document.getElementById("notificationForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const userId = document.getElementById("userId").value.trim();
      const message = document.getElementById("message").value.trim();
      const responseBox = document.getElementById("responseMessage");

      if (!userId.startsWith("HOD")) {
        responseBox.style.display = "block";
        responseBox.className = "alert error";
        responseBox.textContent = "❌ User ID must start with 'HOD'.";
        return;
      }

      try {
        const res = await fetch("/api/notifications/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId, message }),
        });

        const data = await res.json();

        responseBox.style.display = "block";
        if (data.success) {
          responseBox.className = "alert success";
          responseBox.textContent = "✅ Notification sent successfully!";
          document.getElementById("notificationForm").reset();
        } else {
          responseBox.className = "alert error";
          responseBox.textContent = "❌ " + (data.message || "Failed to send notification.");
        }
      } catch (err) {
        responseBox.style.display = "block";
        responseBox.className = "alert error";
        responseBox.textContent = "❌ Network or server error.";
        console.error(err);
      }
    });
  </script>
</body>
</html>
