<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>📢 HOD Notifications</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="crrengglogo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 40px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 30px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      border-radius: 10px;
    }
    h2 {
      margin-bottom: 20px;
      color: #222;
    }
    label {
      font-weight: 600;
    }
    textarea, input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 20px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 15px;
    }
    button {
      background-color: #007bff;
      color: white;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    .status {
      margin-top: 15px;
      font-weight: 500;
    }
    .success {
      color: green;
    }
    .error {
      color: red;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>📢 Send Notification</h2>

    <label for="userId">HOD ID:</label>
    <input type="text" id="userId" placeholder="e.g., HODCSE" required />

    <label for="message">Message:</label>
    <textarea id="message" rows="6" placeholder="Type your notification here..." required></textarea>

    <button onclick="sendNotification()">Send</button>

    <div id="status" class="status"></div>
  </div>

  <script>
    async function sendNotification() {
      const userId = document.getElementById('userId').value.trim();
      const message = document.getElementById('message').value.trim();
      const statusDiv = document.getElementById('status');
      statusDiv.textContent = '';
      statusDiv.className = 'status';

      if (!userId || !message) {
        statusDiv.textContent = 'Please fill in all fields.';
        statusDiv.classList.add('error');
        return;
      }

      if (!userId.startsWith("HOD")) {
        statusDiv.textContent = 'Only HODs can send notifications.';
        statusDiv.classList.add('error');
        return;
      }

      try {
        const res = await fetch('/api/notifications/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, message })
        });

        const data = await res.json();
        if (data.success) {
          statusDiv.textContent = '✅ Notification sent successfully!';
          statusDiv.classList.add('success');
          document.getElementById('message').value = '';
        } else {
          statusDiv.textContent = '❌ Failed to send notification.';
          statusDiv.classList.add('error');
        }
      } catch (error) {
        console.error('❌ Error:', error);
        statusDiv.textContent = '❌ Server error while sending.';
        statusDiv.classList.add('error');
      }
    }
  </script>
</body>
</html>
