<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>📢 HOD Notifications</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f0f0;
      margin: 0;
      padding: 30px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    label {
      display: block;
      margin: 15px 0 5px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      padding: 10px 15px;
      font-size: 16px;
      background-color: #0066cc;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #004999;
    }

    .status {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Send Notification</h2>
    
    <label for="userId">HOD User ID (e.g. HODCSE)</label>
    <input type="text" id="userId" placeholder="Enter your HOD User ID" />

    <label for="message">Notification Message</label>
    <textarea id="message" rows="5" placeholder="Enter your message here..."></textarea>

    <button onclick="sendNotification()">Send</button>

    <div class="status" id="status"></div>
  </div>

  <script>
    async function sendNotification() {
      const userId = document.getElementById('userId').value.trim();
      const message = document.getElementById('message').value.trim();
      const statusEl = document.getElementById('status');

      if (!userId || !message) {
        statusEl.textContent = '❌ Please fill all fields.';
        statusEl.style.color = 'red';
        return;
      }

      try {
        const res = await fetch('/api/notifications/send', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ userId, message })
        });

        const data = await res.json();

        if (data.success) {
          statusEl.textContent = '✅ Notification sent successfully!';
          statusEl.style.color = 'green';
          document.getElementById('message').value = '';
        } else {
          statusEl.textContent = '❌ Failed to send: ' + (data.message || 'Unknown error');
          statusEl.style.color = 'red';
        }
      } catch (err) {
        console.error('Error sending notification:', err);
        statusEl.textContent = '❌ Server error. Please try again.';
        statusEl.style.color = 'red';
      }
    }
  </script>
</body>
</html>
