<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>📢 HOD Notifications</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="crrengglogo.png" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      padding: 40px;
    }

    .container {
      max-width: 600px;
      background: white;
      margin: auto;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      resize: vertical;
    }

    button {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background-color: #004aad;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background-color: #003d91;
    }

    .status {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Send Notification</h2>
    <textarea id="message" placeholder="Enter your message here..."></textarea>
    <button onclick="sendNotification()">Send</button>
    <div class="status" id="statusMsg"></div>
  </div>

  <script>
    async function sendNotification() {
      const message = document.getElementById("message").value.trim();
      const staffId = "HODCSE"; // 🔒 Use session or localStorage if dynamic

      const statusEl = document.getElementById("statusMsg");
      statusEl.textContent = '';

      if (!message) {
        statusEl.textContent = "❌ Please enter a message.";
        statusEl.style.color = "red";
        return;
      }

      try {
        const res = await fetch("/api/notifications/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ staffId, message })
        });

        const data = await res.json();

        if (data.success) {
          statusEl.textContent = "✅ Notification sent successfully.";
          statusEl.style.color = "green";
          document.getElementById("message").value = "";
        } else {
          statusEl.textContent = "❌ Failed to send: " + data.message;
          statusEl.style.color = "red";
        }
      } catch (err) {
        console.error("Error:", err);
        statusEl.textContent = "🚨 Network or server error.";
        statusEl.style.color = "red";
      }
    }
  </script>

</body>
</html>
