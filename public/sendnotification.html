<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Notification</title>
    <link rel="icon" href="crrengglogo.png" type="image/png" />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.20/dist/sweetalert2.min.css"
    />
    <style>
        :root {
            --primary-color: #0b2e59;
            --secondary-color: #2c6e91;
            --accent-color: #f7a048;
            --background-dark: #f0f2f5;
            --background-light: #ffffff;
            --text-dark: #333333;
            --text-light: #f4f4f4;
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --border-radius-lg: 16px;
            --border-radius-md: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-dark);
            color: var(--text-dark);
        }

        /* Container and Overlay */
        .main-container {
            display: flex;
            min-height: 100vh;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .no-scroll {
            overflow: hidden;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--primary-color);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease-in-out;
            z-index: 1000;
            overflow-y: auto;
        }

        .home-icon {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 1.5rem;
            color: var(--text-light);
            cursor: pointer;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .home-icon:hover {
            color: var(--accent-color);
            transform: scale(1.1);
        }

        .sidebar-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .sidebar h2 {
            margin-top: 15px;
            color: var(--text-light);
            font-size: 1.1rem;
            font-weight: bold;
        }

        .menu {
            list-style: none;
            flex-grow: 1;
        }

        .menu li {
            margin-bottom: 12px;
        }

        .menu li a {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1rem;
            color: var(--text-light);
            padding: 15px 20px;
            border-radius: var(--border-radius-md);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .menu li a:hover,
        .menu li.active a {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            font-weight: 500;
            transform: translateX(5px);
            box-shadow: var(--card-shadow);
        }

        .menu li a i {
            font-size: 1.2rem;
            width: 25px;
            text-align: center;
            color: var(--text-light);
            transition: color 0.3s ease;
        }

        .logout {
            background-color: var(--accent-color);
            color: var(--text-light);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            width: 60%;
            margin: 20px auto 0;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .logout:hover {
            background-color: #d3853b;
            transform: scale(1.05);
        }

        /* Main Content */
        .main {
            flex-grow: 1;
            background-color: var(--background-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            margin-left: 280px;
            transition: margin-left 0.3s ease;
        }

        .notification-card {
            background-color: var(--background-light);
            padding: 40px;
            border-radius: var(--border-radius-lg);
            max-width: 600px;
            width: 100%;
            box-shadow: var(--card-shadow);
            text-align: center;
        }

        .notification-card h3 {
            margin-bottom: 25px;
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        .notification-card input,
        .notification-card textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: var(--border-radius-md);
            border: 1px solid #ddd;
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        .notification-card input:focus,
        .notification-card textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 5px rgba(247, 160, 72, 0.5);
        }

        .notification-card textarea {
            resize: vertical;
        }

        .send-btn {
            background-color: var(--primary-color);
            color: var(--text-light);
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            font-weight: bold;
        }

        .send-btn:hover {
            background-color: var(--secondary-color);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background-color: #999;
            cursor: not-allowed;
            transform: none;
        }

        /* Mobile View */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: var(--secondary-color);
            color: var(--text-light);
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }
        @media (max-width: 992px) {
            .mobile-toggle {
                display: flex;
            }
            .sidebar {
                transform: translateX(-100%);
                width: 250px;
                max-width: 80vw;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="overlay" onclick="toggleMobileMenu()"></div>
    <div class="main-container">
        <div class="sidebar">
            <a href="staff-dashboard.html" class="home-icon"><i class="fas fa-home"></i></a>
            <div class="sidebar-header">
                <h2 id="staffName">Staff Name</h2>
                <h2 style="margin-top: 5px;">ID: <span id="staffId">Loading...</span></h2>
            </div>
            <ul class="menu">
                <li><a href="staff-dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="knowaboutstd1.html"><i class="fas fa-search"></i> Know about Student</a></li>
                <li><a href="editstudentdetails.html"><i class="fas fa-user-edit"></i> Edit Student Details</a></li>
                <li class="active"><a href="#"><i class="fas fa-paper-plane"></i> Send Notification</a></li>
                <li><a href="updatefee.html"><i class="fas fa-money-bill-wave"></i> Update Fee</a></li>
                <li><a href="imposefines.html"><i class="fas fa-money-check-alt"></i> Impose Fines</a></li>
                <li><a href="addstudent.html"><i class="fas fa-user-plus"></i> Add Student</a></li>
                <li><a href="mark_attendance.html"><i class="fas fa-clipboard-list"></i> Mark Attendance</a></li>
                <li><a href="backlogs.html"><i class="fas fa-book-open"></i> Find Backlogs</a></li>
                <li><a href="mycounselling.html"><i class="fas fa-handshake"></i> View Counselling</a></li>
                <li><a href="staffsettings.html"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
            <button class="logout" onclick="confirmLogout()">Logout</button>
        </div>

        <div class="main">
            <div class="notification-card">
                <h3>Send Notification</h3>
                <input type="text" id="studentId" placeholder="Eg: 23B81A4601-66, 23B81A4602" required />
                <textarea id="message" rows="4" placeholder="Enter message (e.g., Please pay tuition fees...)" required></textarea>
                <button class="send-btn" onclick="sendNotification()">Send Notification</button>
            </div>
        </div>
    </div>
    <div class="mobile-toggle" onclick="toggleMobileMenu()">☰</div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // 🔐 Unauthorized login check
        const userId = localStorage.getItem("userId");
        if (!userId) {
            Swal.fire({
                icon: 'error',
                title: 'Access Denied',
                text: 'Please login first to view this page.',
                confirmButtonText: 'Go to Login',
                allowOutsideClick: false,
                allowEscapeKey: false,
                confirmButtonColor: '#0b2e59'
            }).then(() => {
                window.location.href = "index.html";
            });
        } else {
            document.getElementById("staffId").textContent = userId;
            fetch(`/staff/${userId}`) 
                .then(res => res.json())
                .then(data => {
                    if (data.staff_name) {
                        document.getElementById("staffName").textContent = data.staff_name;
                    }
                })
                .catch(err => {
                    console.error("Error loading staff data:", err);
                });

            function expandRegNos(input) {
                const parts = input.split(',').map(part => part.trim()).filter(part => part !== '');
                const finalList = new Set();
                
                parts.forEach(part => {
                    if (part.includes('-')) {
                        const [startReg, endNumStr] = part.split('-');
                        const prefix = startReg.slice(0, -2);
                        const startNum = parseInt(startReg.slice(-2));
                        const endNum = parseInt(endNumStr);

                        if (!isNaN(startNum) && !isNaN(endNum) && startNum <= endNum) {
                            for (let i = startNum; i <= endNum; i++) {
                                const suffix = i.toString().padStart(2, '0');
                                finalList.add(`${prefix}${suffix}`);
                            }
                        }
                    } else {
                        finalList.add(part);
                    }
                });
                return Array.from(finalList);
            }

            function sendNotification() {
                const studentIdInput = document.getElementById("studentId").value.trim();
                const message = document.getElementById("message").value.trim();
                const btn = document.querySelector(".send-btn");

                if (!studentIdInput || !message) {
                    Swal.fire({ icon: "warning", title: "Missing Information", text: "Please enter at least one registration number and a message." });
                    return;
                }

                const userIds = expandRegNos(studentIdInput);

                if (userIds.length === 0) {
                    Swal.fire({ icon: "error", title: "Invalid Input", text: "No valid registration numbers found. Please check your input format." });
                    return;
                }
                
                btn.disabled = true;
                btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Sending...`;

                fetch("/send-bulk-notification", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ userIds, message })
                })
                .then(res => res.json())
                .then(data => {
                    btn.disabled = false;
                    btn.innerHTML = `Send Notification`;
                    
                    Swal.fire({
                        icon: data.success ? "success" : "error",
                        title: "Notification Status",
                        html: `
                            <p style="text-align:left; font-size:1rem; color:#555;">
                                <strong style="color: #28a745;">✅ Sent:</strong> ${data.sent}<br>
                                <strong style="color: #dc3545;">❌ Failed:</strong> ${data.failed}
                            </p>
                        `,
                        confirmButtonColor: '#0b2e59'
                    });
                    
                    document.getElementById("studentId").value = "";
                    document.getElementById("message").value = "";
                })
                .catch(error => {
                    console.error("Error sending notification:", error);
                    btn.disabled = false;
                    btn.innerHTML = `Send Notification`;
                    Swal.fire({ 
                        icon: "error", 
                        title: "Failed!", 
                        text: "Something went wrong. Please try again.",
                        confirmButtonColor: '#0b2e59'
                    });
                });
            }

            function toggleMobileMenu() {
                const sidebar = document.querySelector('.sidebar');
                const overlay = document.querySelector('.overlay');
                const body = document.body;

                sidebar.classList.toggle('open');
                overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
                body.classList.toggle('no-scroll', sidebar.classList.contains('open'));
            }

            function confirmLogout() {
                Swal.fire({
                    title: 'Are you sure?',
                    text: "You will be logged out of your account.",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#0b2e59',
                    cancelButtonColor: '#d3853b',
                    confirmButtonText: 'Yes, log out!'
                }).then((result) => {
                    if (result.isConfirmed) {
                        logout();
                    }
                });
            }
            
            function logout() {
                localStorage.clear();
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
