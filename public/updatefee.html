<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff - Update Fee</title>
    <link rel="icon" href="crrengglogo.png" type="image/png" />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.20/dist/sweetalert2.min.css"
    />
    <style>
        :root {
            --primary-color: #0b2e59;
            --secondary-color: #2c6e91;
            --accent-color: #f7a048;
            --background-dark: #f0f2f5;
            --background-light: #ffffff;
            --text-dark: #333333;
            --text-light: #f4f4f4;
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --border-radius-lg: 16px;
            --border-radius-md: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-dark);
            color: var(--text-dark);
        }

        /* Container and Overlay */
        .main-container {
            display: flex;
            min-height: 100vh;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .no-scroll {
            overflow: hidden;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--primary-color);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease-in-out;
            z-index: 1000;
            overflow-y: auto;
        }

        .home-icon {
            position: absolute;
            top: 25px;
            right: 25px;
            font-size: 1.5rem;
            color: var(--text-light);
            cursor: pointer;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .home-icon:hover {
            color: var(--accent-color);
            transform: scale(1.1);
        }

        .sidebar-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .sidebar h2 {
            margin-top: 15px;
            color: var(--text-light);
            font-size: 1.1rem;
            font-weight: bold;
        }

        .menu {
            list-style: none;
            flex-grow: 1;
        }

        .menu li {
            margin-bottom: 12px;
        }

        .menu li a {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1rem;
            color: var(--text-light);
            padding: 15px 20px;
            border-radius: var(--border-radius-md);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .menu li a:hover,
        .menu li.active a {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            font-weight: 500;
            transform: translateX(5px);
            box-shadow: var(--card-shadow);
        }

        .menu li a i {
            font-size: 1.2rem;
            width: 25px;
            text-align: center;
            color: var(--text-light);
            transition: color 0.3s ease;
        }

        .logout {
            background-color: var(--accent-color);
            color: var(--text-light);
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            width: 60%;
            margin: 20px auto 0;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .logout:hover {
            background-color: #d3853b;
            transform: scale(1.05);
        }

        /* Main Content */
        .main {
            flex-grow: 1;
            background-color: var(--background-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            margin-left: 280px;
            transition: margin-left 0.3s ease;
        }

        .header {
            width: 100%;
            background: var(--background-light);
            padding: 15px 30px;
            box-shadow: var(--card-shadow);
            border-radius: var(--border-radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            position: sticky;
            top: 20px;
            z-index: 10;
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        .form-box {
            background-color: var(--background-light);
            padding: 40px 35px;
            border-radius: var(--border-radius-lg);
            max-width: 600px;
            width: 100%;
            box-shadow: var(--card-shadow);
        }

        .form-box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            color: var(--text-dark);
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px;
            border-radius: var(--border-radius-md);
            border: 1px solid #ddd;
            font-size: 0.9rem;
            background-color: #f9f9f9;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .form-box button {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            background-color: var(--primary-color);
            color: var(--text-light);
            border: none;
            border-radius: var(--border-radius-md);
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .form-box button:hover {
            background-color: var(--secondary-color);
            transform: scale(1.01);
        }

        /* Mobile View */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: var(--secondary-color);
            color: var(--text-light);
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }
        @media (max-width: 992px) {
            .mobile-toggle {
                display: flex;
            }
            .sidebar {
                transform: translateX(-100%);
                width: 250px;
                max-width: 80vw;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="overlay" onclick="toggleMobileMenu()"></div>
    <div class="main-container">
        <div class="sidebar">
            <a href="staff-dashboard.html" class="home-icon"><i class="fas fa-home"></i></a>
            <div class="sidebar-header">
                <h2 id="staffName">Staff Name</h2>
                <h2 style="margin-top: 5px;">ID: <span id="staffId">Loading...</span></h2>
            </div>
            <ul class="menu">
                <li><a href="staff-dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
                <li><a href="knowaboutstd1.html"><i class="fas fa-search"></i> Know about Student</a></li>
                <li><a href="editstudentdetails.html"><i class="fas fa-user-edit"></i> Edit Student Details</a></li>
                <li><a href="sendnotification.html"><i class="fas fa-paper-plane"></i> Send Notification</a></li>
                <li class="active"><a href="#"><i class="fas fa-money-bill-wave"></i> Update Fee</a></li>
                <li><a href="imposefines.html"><i class="fas fa-money-check-alt"></i> Impose Fines</a></li>
                <li><a href="addstudent.html"><i class="fas fa-user-plus"></i> Add Student</a></li>
                <li><a href="mark_attendance.html"><i class="fas fa-clipboard-list"></i> Mark Attendance</a></li>
                <li><a href="backlogs.html"><i class="fas fa-book-open"></i> Find Backlogs</a></li>
                <li><a href="mycounselling.html"><i class="fas fa-handshake"></i> View Counselling</a></li>
                <li><a href="staffsettings.html"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
            <button class="logout" onclick="confirmLogout()">Logout</button>
        </div>

        <div class="main">
            <div class="header">
                <h1>Update Student Fee</h1>
            </div>
            <div class="form-box">
                <h2>Update Student Fee Structure</h2>
                <div class="input-group">
                    <label for="reg_no">Reg. Number</label>
                    <input type="text" id="reg_no" placeholder="Enter Reg No" required />
                </div>
                <div class="input-group">
                    <label for="year">Academic Year</label>
                    <select id="year" required>
                        <option value="">Select Year</option>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>
                <div class="input-group"><label for="tuition">Tuition Fee</label><input type="number" id="tuition"></div>
                <div class="input-group"><label for="hostel">Hostel Fee</label><input type="number" id="hostel"></div>
                <div class="input-group"><label for="bus">Bus Fee</label><input type="number" id="bus"></div>
                <div class="input-group"><label for="university">University Fee</label><input type="number" id="university"></div>
                <div class="input-group"><label for="semester">Semester Fee</label><input type="number" id="semester"></div>
                <div class="input-group"><label for="library">Library Dues</label><input type="number" id="library"></div>
                <button onclick="updateFee()">Update Fee</button>
            </div>
        </div>
    </div>
    <div class="mobile-toggle" onclick="toggleMobileMenu()">☰</div>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // 🔐 Unauthorized login check
        const userId = localStorage.getItem("userId");
        if (!userId) {
            Swal.fire({
                icon: 'error',
                title: 'Access Denied',
                text: 'Please login first to view this page.',
                confirmButtonText: 'Go to Login',
                allowOutsideClick: false,
                allowEscapeKey: false,
                confirmButtonColor: '#0b2e59'
            }).then(() => {
                window.location.href = "index.html";
            });
        } else {
            document.getElementById("staffId").textContent = userId;
            fetch(`/staff/${userId}`) 
                .then(res => res.json())
                .then(data => {
                    if (data.staff_name) {
                        document.getElementById("staffName").textContent = data.staff_name;
                    }
                })
                .catch(err => {
                    console.error("Error loading staff data:", err);
                });

            function updateFee() {
                const data = {
                    reg_no: document.getElementById("reg_no").value.trim(),
                    academic_year: parseInt(document.getElementById("year").value),
                    tuition: parseFloat(document.getElementById("tuition").value) || 0,
                    hostel: parseFloat(document.getElementById("hostel").value) || 0,
                    bus: parseFloat(document.getElementById("bus").value) || 0,
                    university: parseFloat(document.getElementById("university").value) || 0,
                    semester: parseFloat(document.getElementById("semester").value) || 0,
                    library: parseFloat(document.getElementById("library").value) || 0
                };

                if (!data.reg_no || !data.academic_year) {
                    Swal.fire({
                        icon: "warning",
                        title: "Missing Information",
                        text: "Please enter both Registration Number and Academic Year."
                    });
                    return;
                }

                Swal.fire({
                    title: 'Updating Fee...',
                    text: 'Please wait, this may take a moment.',
                    didOpen: () => { Swal.showLoading(); },
                    allowOutsideClick: false
                });

                fetch('/update-fee-structure', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                })
                .then(res => res.json())
                .then(response => {
                    if (response.success) {
                        Swal.fire({
                            icon: "success",
                            title: "Update Successful",
                            text: `Fee updated for ${data.reg_no}, Year ${data.academic_year}.`
                        }).then(() => {
                            // Clear form fields on success
                            document.getElementById("reg_no").value = "";
                            document.getElementById("year").value = "";
                            document.getElementById("tuition").value = "";
                            document.getElementById("hostel").value = "";
                            document.getElementById("bus").value = "";
                            document.getElementById("university").value = "";
                            document.getElementById("semester").value = "";
                            document.getElementById("library").value = "";
                        });
                    } else {
                        Swal.fire({
                            icon: "error",
                            title: "Update Failed",
                            text: response.message || "An unknown error occurred."
                        });
                    }
                })
                .catch(err => {
                    console.error("Fetch error:", err);
                    Swal.fire({
                        icon: "error",
                        title: "Server Error",
                        text: "Could not connect to the server. Please check your network."
                    });
                });
            }

            // 📱 Toggle sidebar
            function toggleMobileMenu() {
                const sidebar = document.querySelector('.sidebar');
                const overlay = document.querySelector('.overlay');
                const body = document.body;

                sidebar.classList.toggle('open');
                overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
                body.classList.toggle('no-scroll', sidebar.classList.contains('open'));
            }

            function confirmLogout() {
                Swal.fire({
                    title: 'Are you sure?',
                    text: "You will be logged out of your account.",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#0b2e59',
                    cancelButtonColor: '#d3853b',
                    confirmButtonText: 'Yes, log out!'
                }).then((result) => {
                    if (result.isConfirmed) {
                        logout();
                    }
                });
            }
            
            function logout() {
                localStorage.clear();
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
